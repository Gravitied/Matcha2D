<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matcha2D — Collision Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    h1 { font-size: 16px; color: #a8d5a2; letter-spacing: 2px; }
    h1 a { color: #a8d5a2; text-decoration: none; }
    h1 a:hover { text-decoration: underline; }
    #controls { display: flex; gap: 16px; align-items: center; font-size: 13px; flex-wrap: wrap; justify-content: center; }
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    select, button { background: #222; color: #eee; border: 1px solid #444; padding: 4px 10px; font-family: monospace; cursor: pointer; }
    button:hover { background: #333; }
    input[type="range"] { width: 80px; accent-color: #a8d5a2; }
    .slider-val { min-width: 32px; text-align: right; color: #a8d5a2; }
    .slider-group { display: flex; align-items: center; gap: 4px; }
    canvas { border: 1px solid #333; }
    #stats { font-size: 12px; color: #888; min-height: 1.4em; text-align: center; }
    #loading { color: #a8d5a2; font-size: 14px; }
    #diagnostics { background: #1a1a1a; border: 1px solid #333; padding: 8px 12px; font-size: 11px; color: #aaa; max-width: 700px; width: 100%; }
    #diagnostics h3 { color: #888; font-size: 11px; margin-bottom: 4px; letter-spacing: 1px; }
    .diag-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .diag-val { color: #ddd; }
    .diag-warn { color: #ff6; }
    .diag-err { color: #f66; }
    .diag-ok { color: #6f6; }
  </style>
</head>
<body>
  <h1><a href="demo-hub.html">Matcha2D</a> — Collision Demo</h1>
  <div id="controls">
    <label>Scene:
      <select id="scene">
        <option value="bounce" selected>Bounce</option>
        <option value="stack">Stack</option>
        <option value="pyramid">Pyramid</option>
        <option value="spin">Spin</option>
        <option value="mixed">Mixed</option>
      </select>
    </label>
    <label>Bodies:
      <select id="bodyCount">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </label>
    <button id="reset">Reset</button>
    <label><input type="checkbox" id="animate" checked> Animate</label>
    <label><input type="checkbox" id="showVertices"> Show Vertices</label>
    <label><input type="checkbox" id="showNarrowphase" title="True collider outline from WASM (SAT / narrowphase)"> Narrowphase hitboxes</label>
    <label><input type="checkbox" id="showContacts"> Show Contacts</label>
    <label class="slider-group">Friction:
      <input type="range" id="friction" min="0" max="1" step="0.05" value="0.3">
      <span class="slider-val" id="frictionVal">0.30</span>
    </label>
    <label class="slider-group">Restitution:
      <input type="range" id="restitution" min="0" max="1" step="0.05" value="0.0">
      <span class="slider-val" id="restitutionVal">0.00</span>
    </label>
    <label class="slider-group">Gravity:
      <input type="range" id="gravity" min="-1000" max="1000" step="10" value="400">
      <span class="slider-val" id="gravityVal">400</span>
    </label>
    <label class="slider-group">Speed:
      <input type="range" id="startSpeed" min="10" max="500" step="10" value="150">
      <span class="slider-val" id="startSpeedVal">150</span>
    </label>
  </div>
  <div id="loading">Loading WASM engine...</div>
  <canvas id="canvas" width="800" height="500" style="display:none"></canvas>
  <div id="stats"></div>
  <div id="diagnostics" style="display:none">
    <h3>Physics Diagnostics</h3>
    <div class="diag-row">
      <div id="diagSpeed"></div>
      <div id="diagContacts"></div>
      <div id="diagOverlap"></div>
      <div id="diagPenSlop"></div>
    </div>
  </div>

<script type="importmap">
{
  "imports": {
    "@matcha2d/types": "../packages/types/dist/index.js",
    "@matcha2d/physics-rust": "../packages/physics-rust/pkg/matcha2d_physics.js",
    "@matcha2d/world": "../packages/world/dist/index.js",
    "@matcha2d/render": "../packages/render/dist/index.js"
  }
}
</script>
<script type="module">
import { World } from '@matcha2d/world'
import { drawNarrowphaseColliderOutlinesCanvas } from '@matcha2d/render'

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const W = canvas.width, H = canvas.height

let world = null
let bodies = []
let bodyShapes = []
let wallBodies = []
/** Parallel to wallBodies: cuboid half-extents used for **visual** wall quads (narrowphase overlay is authoritative). */
let wallHalfExtents = []

const SHAPE_COLORS = {
  circle:   { fill: 'rgba(100,180,255,0.18)', stroke: '#64b4ff' },
  box:      { fill: 'rgba(64,180,128,0.18)', stroke: '#40b480' },
  triangle: { fill: 'rgba(255,180,60,0.18)', stroke: '#ffb43c' },
  pentagon: { fill: 'rgba(200,100,255,0.18)', stroke: '#c864ff' },
  hexagon:  { fill: 'rgba(255,100,180,0.18)', stroke: '#ff64b4' },
  floor:    { fill: 'rgba(255,255,255,0.05)', stroke: '#444' },
}

function regularPolygonVerts(sides, radius) {
  const verts = []
  for (let i = 0; i < sides; i++) {
    const angle = (2 * Math.PI * i) / sides - Math.PI / 2
    verts.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius })
  }
  return verts
}

  function randomShape() {
    const shapes = ['circle', 'triangle', 'pentagon', 'hexagon']
    return shapes[Math.floor(Math.random() * shapes.length)]
  }

/** Max distance from body origin to any collider feature (px); valid for arbitrary rotation. */
function clearanceRadiusPx(shapeName, radius) {
  switch (shapeName) {
    case 'circle':
      return radius
    case 'box':
      return Math.SQRT2 * radius * 1.2
    default:
      return radius
  }
}

function addCollider(body, shapeName, radius, friction, restitution) {
  switch (shapeName) {
    case 'circle':
      world.addCollider(body, { shape: 'ball', radius, friction, restitution })
      break
    case 'box': {
      const s = radius * 1.2
      world.addCollider(body, { shape: 'cuboid', halfExtentX: s, halfExtentY: s, friction, restitution })
      break
    }
    case 'triangle':
      world.addCollider(body, { shape: 'polygon', vertices: regularPolygonVerts(3, radius), friction, restitution })
      break
    case 'pentagon':
      world.addCollider(body, { shape: 'polygon', vertices: regularPolygonVerts(5, radius), friction, restitution })
      break
    case 'hexagon':
      world.addCollider(body, { shape: 'polygon', vertices: regularPolygonVerts(6, radius), friction, restitution })
      break
    default:
      world.addCollider(body, { shape: 'ball', radius, friction, restitution })
  }
}

function clearScene() {
  for (const b of bodies) world.destroyBody(b)
  for (const b of wallBodies) world.destroyBody(b)
  bodies = []
  bodyShapes = []
  wallBodies = []
  wallHalfExtents = []
}

function createWalls(friction, restitution) {
  // Thick enough for TOI + fast spawns at pixel scale (2px was far below solver step motion).
  const wallThickness = 8
  // Floor
  const floor = world.createBody({ positionX: W / 2, positionY: H - wallThickness / 2, type: 'static' })
  const floorHx = W / 2
  const floorHy = wallThickness / 2
  world.addCollider(floor, { shape: 'cuboid', halfExtentX: floorHx, halfExtentY: floorHy, friction, restitution })
  wallBodies.push(floor)
  wallHalfExtents.push({ hx: floorHx, hy: floorHy })

  // Ceiling
  const ceil = world.createBody({ positionX: W / 2, positionY: wallThickness / 2, type: 'static' })
  world.addCollider(ceil, { shape: 'cuboid', halfExtentX: floorHx, halfExtentY: floorHy, friction, restitution })
  wallBodies.push(ceil)
  wallHalfExtents.push({ hx: floorHx, hy: floorHy })

  // Left wall
  const left = world.createBody({ positionX: wallThickness / 2, positionY: H / 2, type: 'static' })
  const sideHx = wallThickness / 2
  const sideHy = H / 2
  world.addCollider(left, { shape: 'cuboid', halfExtentX: sideHx, halfExtentY: sideHy, friction, restitution })
  wallBodies.push(left)
  wallHalfExtents.push({ hx: sideHx, hy: sideHy })

  // Right wall
  const right = world.createBody({ positionX: W - wallThickness / 2, positionY: H / 2, type: 'static' })
  world.addCollider(right, { shape: 'cuboid', halfExtentX: sideHx, halfExtentY: sideHy, friction, restitution })
  wallBodies.push(right)
  wallHalfExtents.push({ hx: sideHx, hy: sideHy })
}

function createBounceScene(bodyCount, friction, restitution, startSpeed) {
  createWalls(friction, restitution)
  const placed = []
  const margin = 6
  const maxAttempts = 4000
  outer: for (let i = 0; i < bodyCount; i++) {
    const shapeName = randomShape()
    let radius, x, y
    let ok = false
    for (let attempt = 0; attempt < maxAttempts && !ok; attempt++) {
      radius = 15 + Math.random() * 25
      const r0 = clearanceRadiusPx(shapeName, radius) + margin
      x = r0 + Math.random() * (W - 2 * r0)
      y = r0 + Math.random() * (H - 2 * r0)
      ok = true
      for (const p of placed) {
        const r1 = clearanceRadiusPx(p.shapeName, p.radius) + margin
        const dx = x - p.x
        const dy = y - p.y
        if (dx * dx + dy * dy < (r0 + r1) * (r0 + r1)) {
          ok = false
          break
        }
      }
    }
    if (!ok) break outer
    placed.push({ shapeName, radius, x, y })
    const body = world.createBody({
      positionX: x, positionY: y,
      angle: Math.random() * Math.PI * 2, type: 'dynamic',
    })
    addCollider(body, shapeName, radius, friction, restitution)
    world.setBodyVelocity(body,
      (Math.random() - 0.5) * startSpeed,
      (Math.random() - 0.5) * startSpeed
    )
    bodies.push(body)
    bodyShapes.push({ shape: shapeName, radius })
  }
}

function createStackScene(bodyCount, friction, restitution) {
  createWalls(friction, restitution)
  const boxSize = 20
  const cols = Math.min(Math.ceil(Math.sqrt(bodyCount * 2)), 8)
  const rows = Math.ceil(bodyCount / cols)
  let count = 0
  for (let r = 0; r < rows && count < bodyCount; r++) {
    for (let c = 0; c < cols && count < bodyCount; c++) {
      const x = W / 2 - (cols - 1) * boxSize + c * boxSize * 2
      const y = H - 20 - boxSize - r * boxSize * 2
      const body = world.createBody({
        positionX: x, positionY: y,
        angle: 0, type: 'dynamic',
      })
      addCollider(body, 'box', boxSize / 1.2, friction, restitution)
      bodies.push(body)
      bodyShapes.push({ shape: 'box', radius: boxSize / 1.2 })
      count++
    }
  }
}

function createPyramidScene(bodyCount, friction, restitution) {
  createWalls(friction, restitution)
  const boxSize = 18
  let count = 0
  let row = 0
  while (count < bodyCount) {
    const colsInRow = row + 1
    for (let c = 0; c < colsInRow && count < bodyCount; c++) {
      const x = W / 2 - (colsInRow - 1) * boxSize + c * boxSize * 2
      const y = H - 20 - boxSize - row * boxSize * 2
      const body = world.createBody({
        positionX: x, positionY: y,
        angle: 0, type: 'dynamic',
      })
      addCollider(body, 'box', boxSize / 1.2, friction, restitution)
      bodies.push(body)
      bodyShapes.push({ shape: 'box', radius: boxSize / 1.2 })
      count++
    }
    row++
  }
}

function createSpinScene(bodyCount, friction, restitution, startSpeed) {
  createWalls(friction, restitution)
  const obstacleHalf = 40
  const centerCx = W / 2
  const centerCy = H / 2
  const obstacleCornerDist = Math.SQRT2 * obstacleHalf

  const center = world.createBody({ positionX: centerCx, positionY: centerCy, type: 'static' })
  world.addCollider(center, { shape: 'cuboid', halfExtentX: obstacleHalf, halfExtentY: obstacleHalf, friction, restitution })
  wallBodies.push(center)
  wallHalfExtents.push({ hx: obstacleHalf, hy: obstacleHalf })

  const placed = []
  const margin = 6
  const maxAttempts = 4000
  outer: for (let i = 0; i < bodyCount; i++) {
    let shapeName, radius, x, y, bodyAngle
    let ok = false
    for (let attempt = 0; attempt < maxAttempts && !ok; attempt++) {
      shapeName = randomShape()
      radius = 12 + Math.random() * 18
      bodyAngle = Math.random() * Math.PI * 2
      const cr = clearanceRadiusPx(shapeName, radius) + margin
      const minDist = obstacleCornerDist + cr
      const maxDist = Math.min(W / 2, H / 2) - cr - 4
      if (minDist >= maxDist) continue
      const dist = minDist + Math.random() * (maxDist - minDist)
      const ang = Math.random() * Math.PI * 2
      x = centerCx + Math.cos(ang) * dist
      y = centerCy + Math.sin(ang) * dist
      const dcx = x - centerCx
      const dcy = y - centerCy
      const dCenter = Math.sqrt(dcx * dcx + dcy * dcy)
      if (dCenter < obstacleCornerDist + clearanceRadiusPx(shapeName, radius) + margin) continue
      ok = true
      for (const p of placed) {
        const r1 = clearanceRadiusPx(p.shapeName, p.radius) + margin
        const dx = x - p.x
        const dy = y - p.y
        if (dx * dx + dy * dy < (cr + r1) * (cr + r1)) {
          ok = false
          break
        }
      }
    }
    if (!ok) break outer
    placed.push({ shapeName, radius, x, y })
    const body = world.createBody({
      positionX: x, positionY: y,
      angle: bodyAngle, type: 'dynamic',
    })
    addCollider(body, shapeName, radius, friction, restitution)
    const speed = startSpeed * 0.5
    const tx = centerCx - x
    const ty = centerCy - y
    const tlen = Math.sqrt(tx * tx + ty * ty) || 1
    world.setBodyVelocity(body,
      (tx / tlen) * speed + (-ty / tlen) * speed * 0.5,
      (ty / tlen) * speed + (tx / tlen) * speed * 0.5
    )
    bodies.push(body)
    bodyShapes.push({ shape: shapeName, radius })
  }
}

function createMixedScene(bodyCount, friction, restitution) {
  createWalls(friction, restitution)
  const rampCx = W * 0.3
  const rampCy = H - 20
  /** Conservative circle covering the tilted ramp cuboid (half 120×8). */
  const rampClearanceR = Math.hypot(120, 8) + 12

  const ramp = world.createBody({ positionX: rampCx, positionY: rampCy, type: 'static', angle: -0.3 })
  world.addCollider(ramp, { shape: 'cuboid', halfExtentX: 120, halfExtentY: 8, friction, restitution })
  wallBodies.push(ramp)
  wallHalfExtents.push({ hx: 120, hy: 8 })

  const placed = []
  const margin = 6
  const maxAttempts = 4000
  outer: for (let i = 0; i < bodyCount; i++) {
    const shapeName = randomShape()
    let radius, x, y
    let ok = false
    for (let attempt = 0; attempt < maxAttempts && !ok; attempt++) {
      radius = 10 + Math.random() * 20
      const cr = clearanceRadiusPx(shapeName, radius) + margin
      const xSpan = W - 2 * cr
      const ySpan = H * 0.4 - 2 * cr
      if (xSpan <= 0 || ySpan <= 0) continue
      x = cr + Math.random() * xSpan
      y = 30 + cr + Math.random() * ySpan
      if (y < cr || y > H - cr) continue
      const dRamp = Math.hypot(x - rampCx, y - rampCy)
      if (dRamp < rampClearanceR + clearanceRadiusPx(shapeName, radius) + margin) continue
      ok = true
      for (const p of placed) {
        const r1 = clearanceRadiusPx(p.shapeName, p.radius) + margin
        const dx = x - p.x
        const dy = y - p.y
        if (dx * dx + dy * dy < (cr + r1) * (cr + r1)) {
          ok = false
          break
        }
      }
    }
    if (!ok) break outer
    placed.push({ shapeName, radius, x, y })
    const body = world.createBody({
      positionX: x, positionY: y,
      angle: Math.random() * Math.PI * 2, type: 'dynamic',
    })
    addCollider(body, shapeName, radius, friction, restitution)
    world.setBodyVelocity(body, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50)
    bodies.push(body)
    bodyShapes.push({ shape: shapeName, radius })
  }
}

async function init() {
  const gravityValue = parseFloat(document.getElementById('gravity').value)
  
  if (!world) {
    world = await World.create({
      gravity: { x: 0, y: gravityValue },
      // Pixel-scale resting contacts: slightly looser allowed overlap than meter-scale default.
      penetrationSlop: 0.65,
      baumgarteFactor: 0.15,
    })
    document.getElementById('loading').style.display = 'none'
    canvas.style.display = 'block'
  } else {
    world.setGravity(0, gravityValue)
  }

  clearScene()

  const scene = document.getElementById('scene').value
  const bodyCount = parseInt(document.getElementById('bodyCount').value)
  const friction = parseFloat(document.getElementById('friction').value)
  const restitution = parseFloat(document.getElementById('restitution').value)
  const startSpeed = parseFloat(document.getElementById('startSpeed').value)

  switch (scene) {
    case 'bounce': createBounceScene(bodyCount, friction, restitution, startSpeed); break
    case 'stack': createStackScene(bodyCount, friction, restitution); break
    case 'pyramid': createPyramidScene(bodyCount, friction, restitution); break
    case 'spin': createSpinScene(bodyCount, friction, restitution, startSpeed); break
    case 'mixed': createMixedScene(bodyCount, friction, restitution); break
  }
}

function step(dt) {
  if (!world) return
  world.step(dt)
}

function drawShape(i) {
  const [px, py] = world.getBodyPosition(bodies[i])
  const angle = world.getBodyAngle(bodies[i])
  const b = bodyShapes[i]
  const colors = SHAPE_COLORS[b.shape] || SHAPE_COLORS.box

  ctx.fillStyle = colors.fill
  ctx.strokeStyle = colors.stroke
  ctx.lineWidth = 1.5

  const cos = Math.cos(angle), sin = Math.sin(angle)

  if (b.shape === 'circle') {
    ctx.beginPath()
    ctx.arc(px, py, b.radius, 0, Math.PI * 2)
    ctx.fill()
    ctx.stroke()
  } else if (b.shape === 'box') {
    const s = b.radius * 1.2
    const lx = [-s, s, s, -s], ly = [-s, -s, s, s]
    ctx.beginPath()
    for (let v = 0; v < 4; v++) {
      const wx = cos * lx[v] - sin * ly[v] + px
      const wy = sin * lx[v] + cos * ly[v] + py
      v === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  } else if (b.shape === 'floor') {
    // Static walls - draw as simple rectangles
    ctx.fillStyle = 'rgba(255,255,255,0.03)'
    ctx.strokeStyle = '#333'
    ctx.lineWidth = 1
    const size = b.radius
    ctx.fillRect(px - size, py - size, size * 2, size * 2)
    ctx.strokeRect(px - size, py - size, size * 2, size * 2)
    return
  } else {
    const sides = { triangle: 3, pentagon: 5, hexagon: 6 }[b.shape] || 4
    const verts = regularPolygonVerts(sides, b.radius)
    ctx.beginPath()
    for (let v = 0; v < verts.length; v++) {
      const wx = cos * verts[v].x - sin * verts[v].y + px
      const wy = sin * verts[v].x + cos * verts[v].y + py
      v === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  }
}

function drawContactPoints() {
  if (!document.getElementById('showContacts').checked) return
  let maxPen = 0
  try {
    maxPen = world.maxPenetration
  } catch (e) { return }

  // Draw contact indicators based on penetration severity
  const penClass = maxPen > 2 ? '#f44' : maxPen > 0.5 ? '#ff4' : '#4f4'
  ctx.fillStyle = penClass
  ctx.font = '10px monospace'
  ctx.fillText(`Max pen: ${maxPen.toFixed(3)}`, 10, H - 10)
}

function render() {
  if (!world) return

  ctx.clearRect(0, 0, W, H)

  // Draw walls first (oriented box; half-extents match addCollider — was wrongly a square via bodyShapes radius)
  for (let i = 0; i < wallBodies.length; i++) {
    const [px, py] = world.getBodyPosition(wallBodies[i])
    const angle = world.getBodyAngle(wallBodies[i])
    const he = wallHalfExtents[i]
    if (!he) continue

    ctx.fillStyle = 'rgba(255,255,255,0.03)'
    ctx.strokeStyle = '#333'
    ctx.lineWidth = 1

    const cos = Math.cos(angle), sin = Math.sin(angle)
    const hx = he.hx
    const hy = he.hy
    const lx = [-hx, hx, hx, -hx]
    const ly = [-hy, -hy, hy, hy]
    ctx.beginPath()
    for (let v = 0; v < 4; v++) {
      const wx = cos * lx[v] - sin * ly[v] + px
      const wy = sin * lx[v] + cos * ly[v] + py
      v === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  }

  if (bodies.length === 0) return

  // Draw bodies
  for (let i = 0; i < bodies.length; i++) {
    drawShape(i)
  }

  // Show vertices
  if (document.getElementById('showVertices').checked) {
    ctx.fillStyle = '#ff0'
    for (let i = 0; i < bodies.length; i++) {
      const [px, py] = world.getBodyPosition(bodies[i])
      const angle = world.getBodyAngle(bodies[i])
      const b = bodyShapes[i]
      const cos = Math.cos(angle), sin = Math.sin(angle)

      let verts
      if (b.shape === 'circle') {
        verts = []
        for (let a = 0; a < 8; a++) {
          const ang = (Math.PI * 2 * a) / 8
          verts.push({ x: Math.cos(ang) * b.radius, y: Math.sin(ang) * b.radius })
        }
      } else if (b.shape === 'box') {
        const s = b.radius * 1.2
        verts = [{ x: -s, y: -s }, { x: s, y: -s }, { x: s, y: s }, { x: -s, y: s }]
      } else {
        const sides = { triangle: 3, pentagon: 5, hexagon: 6 }[b.shape] || 4
        verts = regularPolygonVerts(sides, b.radius)
      }

      for (const v of verts) {
        const wx = cos * v.x - sin * v.y + px
        const wy = sin * v.x + cos * v.y + py
        ctx.beginPath()
        ctx.arc(wx, wy, 3, 0, Math.PI * 2)
        ctx.fill()
      }
    }
  }

  drawContactPoints()

  if (document.getElementById('showNarrowphase').checked) {
    const outlines = world.getNarrowphaseColliderOutlines()
    drawNarrowphaseColliderOutlinesCanvas(ctx, outlines, {
      pixelsPerMeter: 1,
      canvasHeight: H,
      physicsYUp: false,
      lineWidth: 2,
    })
  }
}

const WINDOW = 60
const frameDts = new Float64Array(WINDOW)
let ringIdx = 0, samplesFilled = 0
let diagFrameCount = 0

function updateDiagnostics() {
  diagFrameCount++
  let totalSpeed = 0, maxSpeed = 0
  for (let i = 0; i < bodies.length; i++) {
    const [vx, vy] = world.getBodyVelocity(bodies[i])
    const s = Math.sqrt(vx * vx + vy * vy)
    totalSpeed += s
    if (s > maxSpeed) maxSpeed = s
  }
  const avgSpeed = totalSpeed / Math.max(1, bodies.length)

  let contacts = 0, maxPen = 0, debugDump = ''
  try {
    contacts = world.contactPointCount
    maxPen = world.maxPenetration
    debugDump = world.debugDump
  } catch (e) {}

  const slop = world?.config?.penetrationSlop ?? 0
  const penOverSlop = Math.max(0, maxPen - slop)
  const penClass =
    penOverSlop > 1.2 ? 'diag-err' : penOverSlop > 0.35 ? 'diag-warn' : 'diag-ok'

  document.getElementById('diagSpeed').innerHTML =
    `Avg: <span class="diag-val">${avgSpeed.toFixed(1)}</span> | Max: <span class="diag-val">${maxSpeed.toFixed(1)}</span>`
  document.getElementById('diagContacts').innerHTML =
    `Contacts: <span class="diag-val">${contacts}</span> | Pen: <span class="${penClass}">${maxPen.toFixed(4)}</span>`
  document.getElementById('diagOverlap').innerHTML =
    `<span style="color:#666">${debugDump}</span>`
  document.getElementById('diagPenSlop').innerHTML =
    `Slop: <span class="diag-val">${slop.toFixed(3)}</span> | ` +
    `<span title="max(0, maxPen − slop). Large raw pen with small excess is often allowed overlap, not tunneling.">` +
    `Pen−slop: <span class="${penClass}">${penOverSlop.toFixed(4)}</span></span>`

  document.getElementById('diagnostics').style.display = 'block'

  if (diagFrameCount <= 5 || diagFrameCount % 60 === 0) {
    console.log(
      `[Frame ${diagFrameCount}] spd=${avgSpeed.toFixed(1)} maxSpd=${maxSpeed.toFixed(1)} ` +
      `contacts=${contacts} pen=${maxPen.toFixed(4)} penSlop=${penOverSlop.toFixed(4)} slop=${slop.toFixed(3)} | ${debugDump}`
    )
  }
}

function avg(arr, filled) {
  let s = 0
  const n = Math.min(filled, WINDOW)
  for (let i = 0; i < n; i++) s += arr[i]
  return s / n
}

let last = null
function loop(ts) {
  const dt = last !== null ? ts - last : 0
  last = ts

  const t0 = performance.now()
  if (dt > 0 && document.getElementById('animate').checked && world && bodies.length > 0)
    step(Math.min(dt / 1000, 0.05))
  const elapsed = performance.now() - t0

  render()
  updateDiagnostics()

  frameDts[ringIdx] = dt > 0 ? dt : 16.67
  ringIdx = (ringIdx + 1) % WINDOW
  samplesFilled++

  const avgDt = avg(frameDts, samplesFilled)
  const fps = avgDt > 0 ? 1000 / avgDt : 0

  document.getElementById('stats').textContent =
    `Rust/WASM | ${bodies.length} bodies | step: ${elapsed.toFixed(3)} ms | fps: ${fps.toFixed(1)}`

  requestAnimationFrame(loop)
}

async function resetAll() { ringIdx = 0; samplesFilled = 0; await init() }
document.getElementById('reset').addEventListener('click', resetAll)
document.getElementById('bodyCount').addEventListener('change', resetAll)
document.getElementById('scene').addEventListener('change', resetAll)

const frictionSlider = document.getElementById('friction')
const restitutionSlider = document.getElementById('restitution')
const gravitySlider = document.getElementById('gravity')
const startSpeedSlider = document.getElementById('startSpeed')
const frictionVal = document.getElementById('frictionVal')
const restitutionVal = document.getElementById('restitutionVal')
const gravityVal = document.getElementById('gravityVal')
const startSpeedVal = document.getElementById('startSpeedVal')

frictionSlider.addEventListener('input', () => { frictionVal.textContent = parseFloat(frictionSlider.value).toFixed(2) })
restitutionSlider.addEventListener('input', () => { restitutionVal.textContent = parseFloat(restitutionSlider.value).toFixed(2) })
gravitySlider.addEventListener('input', () => {
  gravityVal.textContent = parseInt(gravitySlider.value)
  if (world) world.setGravity(0, parseFloat(gravitySlider.value))
})
startSpeedSlider.addEventListener('input', () => { startSpeedVal.textContent = parseInt(startSpeedSlider.value) })

;(async function main() {
  await init()
  requestAnimationFrame(loop)
})()
</script>
</body>
