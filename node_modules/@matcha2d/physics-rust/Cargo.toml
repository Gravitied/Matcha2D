[package]
name = "matcha2d-physics"
version = "0.1.0"
edition = "2021"
description = "Matcha2D 2D Physics Engine"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
bytemuck = { version = "1.21", features = ["derive"] }
wgpu = "23.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
pollster = "0.4"

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "WorkerGlobalScope"] }

[dev-dependencies]
pollster = "0.4"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
# wasm32-unknown-unknown defaults to panic=abort, which turns every panic into an opaque `unreachable`.
panic = "unwind"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O"]
