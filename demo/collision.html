<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matcha2D — Collision Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    h1 { font-size: 16px; color: #a8d5a2; letter-spacing: 2px; }
    #controls { display: flex; gap: 16px; align-items: center; font-size: 13px; flex-wrap: wrap; justify-content: center; }
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    select, button { background: #222; color: #eee; border: 1px solid #444; padding: 4px 10px; font-family: monospace; cursor: pointer; }
    button:hover { background: #333; }
    input[type="range"] { width: 80px; accent-color: #a8d5a2; }
    .slider-val { min-width: 32px; text-align: right; color: #a8d5a2; }
    .slider-group { display: flex; align-items: center; gap: 4px; }
    canvas { border: 1px solid #333; }
    #stats { font-size: 12px; color: #888; min-height: 1.4em; text-align: center; }
  </style>
</head>
<body>
  <h1>Matcha2D — Collision Demo</h1>
  <div id="controls">
    <label>Shape:
      <select id="shape">
        <option value="circle">Circle</option>
        <option value="box" selected>Box</option>
        <option value="triangle">Triangle</option>
        <option value="pentagon">Pentagon</option>
        <option value="hexagon">Hexagon</option>
        <option value="mixed">Mixed</option>
      </select>
    </label>
    <label>Broadphase:
      <select id="broadphase">
        <option value="sap" selected>SAP (Sort-and-Sweep)</option>
        <option value="bvh">BVH (AABB Tree)</option>
      </select>
    </label>
    <label>Narrowphase:
      <select id="narrowphase">
        <option value="sat" selected>SAT</option>
        <option value="gjk">GJK + EPA</option>
      </select>
    </label>
    <label>Bodies:
      <select id="bodyCount">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </label>
    <button id="reset">Reset</button>
    <label><input type="checkbox" id="animate" checked> Animate</label>
    <label><input type="checkbox" id="showNormals" checked> Show Normals</label>
    <label><input type="checkbox" id="showContacts" checked> Show Contacts</label>
    <label class="slider-group">Friction:
      <input type="range" id="friction" min="0" max="1" step="0.05" value="0.3">
      <span class="slider-val" id="frictionVal">0.30</span>
    </label>
    <label class="slider-group">Mass:
      <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1">
      <span class="slider-val" id="massVal">1.0</span>
    </label>
    <label class="slider-group">Start Speed:
      <input type="range" id="startSpeed" min="10" max="500" step="10" value="150">
      <span class="slider-val" id="startSpeedVal">150</span>
    </label>
  </div>
  <canvas id="canvas" width="800" height="500"></canvas>
  <div id="stats"></div>

<script type="importmap">
{
  "imports": {
    "@matcha2d/types": "../packages/types/dist/index.js",
    "@matcha2d/core": "../packages/core/dist/index.js"
  }
}
</script>
<script type="module">
import { createBuffers, ShapeType, BodyFlags, MAX_VERTICES_PER_SHAPE } from '@matcha2d/types'
import { broadphase, narrowphase, gjkNarrowphase, mat2FromAngle, collide } from '@matcha2d/core'

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const W = canvas.width, H = canvas.height

let bodyCount = 10
let buffers, bodyData

const SHAPE_COLORS = {
  circle:   { fill: 'rgba(100,180,255,0.18)', stroke: '#64b4ff' },
  box:      { fill: 'rgba(64,180,128,0.18)', stroke: '#40b480' },
  triangle: { fill: 'rgba(255,180,60,0.18)', stroke: '#ffb43c' },
  pentagon: { fill: 'rgba(200,100,255,0.18)', stroke: '#c864ff' },
  hexagon:  { fill: 'rgba(255,100,180,0.18)', stroke: '#ff64b4' },
}

function regularPolygonVerts(sides, radius, outX, outY) {
  for (let i = 0; i < sides; i++) {
    const angle = (2 * Math.PI * i) / sides - Math.PI / 2
    outX[i] = Math.cos(angle) * radius
    outY[i] = Math.sin(angle) * radius
  }
}

function getShapeConfig(shape, radius) {
  const tmpX = new Array(16), tmpY = new Array(16)
  switch (shape) {
    case 'circle':
      return { type: ShapeType.Circle, radius, halfX: radius, halfY: radius, verts: null, vertCount: 0 }
    case 'box': {
      const s = radius * 1.2
      return { type: ShapeType.Box, radius: 0, halfX: s, halfY: s, verts: null, vertCount: 0 }
    }
    case 'triangle': {
      regularPolygonVerts(3, radius, tmpX, tmpY)
      return { type: ShapeType.Polygon, radius: 0, halfX: radius, halfY: radius, verts: { x: [...tmpX], y: [...tmpY] }, vertCount: 3 }
    }
    case 'pentagon': {
      regularPolygonVerts(5, radius, tmpX, tmpY)
      return { type: ShapeType.Polygon, radius: 0, halfX: radius, halfY: radius, verts: { x: [...tmpX], y: [...tmpY] }, vertCount: 5 }
    }
    case 'hexagon': {
      regularPolygonVerts(6, radius, tmpX, tmpY)
      return { type: ShapeType.Polygon, radius: 0, halfX: radius, halfY: radius, verts: { x: [...tmpX], y: [...tmpY] }, vertCount: 6 }
    }
  }
}

function randomShape() {
  const shapes = ['circle', 'box', 'triangle', 'pentagon', 'hexagon']
  return shapes[Math.floor(Math.random() * shapes.length)]
}

function init() {
  bodyCount = parseInt(document.getElementById('bodyCount').value)
  buffers = createBuffers(bodyCount)
  bodyData = []
  const shapeSel = document.getElementById('shape').value

  for (let i = 0; i < bodyCount; i++) {
    const shapeName = shapeSel === 'mixed' ? randomShape() : shapeSel
    const radius = 15 + Math.random() * 25
    const cfg = getShapeConfig(shapeName, radius)

    buffers.positionX[i] = cfg.halfX + Math.random() * (W - cfg.halfX * 2)
    buffers.positionY[i] = cfg.halfY + Math.random() * (H - cfg.halfY * 2)
    buffers.angle[i] = Math.random() * Math.PI * 2
    buffers.flags[i] = BodyFlags.ACTIVE
    buffers.halfExtentX[i] = cfg.halfX
    buffers.halfExtentY[i] = cfg.halfY
    buffers.shapeType[i] = cfg.type
    buffers.shapeRadius[i] = cfg.radius
    const massScale = parseFloat(document.getElementById('mass').value)
    const startSpeed = parseFloat(document.getElementById('startSpeed').value)

    buffers.velocityX[i] = (Math.random() - 0.5) * startSpeed
    buffers.velocityY[i] = (Math.random() - 0.5) * startSpeed
    buffers.angularVel[i] = (Math.random() - 0.5) * 2

    if (cfg.verts) {
      const base = i * MAX_VERTICES_PER_SHAPE
      for (let v = 0; v < cfg.vertCount; v++) {
        buffers.shapeVerticesX[base + v] = cfg.verts.x[v]
        buffers.shapeVerticesY[base + v] = cfg.verts.y[v]
      }
      buffers.shapeVertexCount[i] = cfg.vertCount
    }

    const mass = (cfg.type === ShapeType.Circle
      ? Math.PI * cfg.radius * cfg.radius * 0.01
      : cfg.halfX * cfg.halfY * 0.01) * massScale
    buffers.mass[i] = mass
    buffers.invMass[i] = 1 / mass
    buffers.inertia[i] = cfg.type === ShapeType.Circle
      ? 0.5 * mass * cfg.radius * cfg.radius
      : (1 / 12) * mass * (4 * cfg.halfX * cfg.halfX + 4 * cfg.halfY * cfg.halfY)
    buffers.invInertia[i] = 1 / buffers.inertia[i]

    bodyData.push({
      shape: shapeName,
      radius,
    })
  }
}

const POSITION_CORRECTION_PERCENT = 0.8
const SLOP = 0.01
const EPSILON = 1e-6

function getFriction() {
  return parseFloat(document.getElementById('friction').value)
}

function resolveCollision(a, b, manifold) {
  const invMassA = buffers.invMass[a]
  const invMassB = buffers.invMass[b]
  const invMassSum = invMassA + invMassB
  if (invMassSum < EPSILON) return

  const [cA, negSA, sA] = mat2FromAngle(buffers.angle[a])
  const [cB, negSB, sB] = mat2FromAngle(buffers.angle[b])
  const nx = manifold.normal.x
  const ny = manifold.normal.y

  for (const contact of manifold.contacts) {
    const worldCX = buffers.positionX[a] + cA * contact.localA.x + negSA * contact.localA.y
    const worldCY = buffers.positionY[a] + sA * contact.localA.x + cA * contact.localA.y

    const rAX = worldCX - buffers.positionX[a]
    const rAY = worldCY - buffers.positionY[a]
    const rBX = worldCX - buffers.positionX[b]
    const rBY = worldCY - buffers.positionY[b]

    const vAX = buffers.velocityX[a], vAY = buffers.velocityY[a]
    const vBX = buffers.velocityX[b], vBY = buffers.velocityY[b]
    const wA = buffers.angularVel[a], wB = buffers.angularVel[b]

    const vAXp = vAX + (-wA * rAY)
    const vAYp = vAY + (wA * rAX)
    const vBXp = vBX + (-wB * rBY)
    const vBYp = vBY + (wB * rBX)

    const relVX = vBXp - vAXp
    const relVY = vBYp - vAYp

    const velAlongNormal = relVX * nx + relVY * ny
    if (velAlongNormal > 0) return

    const raCrossN = rAX * ny - rAY * nx
    const rbCrossN = rBX * ny - rBY * nx

    const invInertiaA = buffers.invInertia[a]
    const invInertiaB = buffers.invInertia[b]

    const friction = getFriction()
    const restitution = 1 - friction * 0.4
    const j = -(1 + restitution) * velAlongNormal
    const denom = invMassSum + raCrossN * raCrossN * invInertiaA + rbCrossN * rbCrossN * invInertiaB
    if (denom < EPSILON) return
    const impulse = j / denom

    buffers.velocityX[a] -= impulse * invMassA * nx
    buffers.velocityY[a] -= impulse * invMassA * ny
    buffers.angularVel[a] -= invInertiaA * (rAX * impulse * ny - rAY * impulse * nx)

    buffers.velocityX[b] += impulse * invMassB * nx
    buffers.velocityY[b] += impulse * invMassB * ny
    buffers.angularVel[b] += invInertiaB * (rBX * impulse * ny - rBY * impulse * nx)

    const tx = relVX - velAlongNormal * nx
    const ty = relVY - velAlongNormal * ny
    const tLen = Math.sqrt(tx * tx + ty * ty)
    if (tLen > EPSILON) {
      const tnx = tx / tLen
      const tny = ty / tLen
      const raCrossT = rAX * tny - rAY * tnx
      const rbCrossT = rBX * tny - rBY * tnx
      const jt = -(relVX * tnx + relVY * tny)
      const denomT = invMassSum + raCrossT * raCrossT * invInertiaA + rbCrossT * rbCrossT * invInertiaB
      if (denomT > EPSILON) {
        let frictionImpulse = jt / denomT
        frictionImpulse = Math.max(-friction * impulse, Math.min(friction * impulse, frictionImpulse))
        buffers.velocityX[a] -= frictionImpulse * invMassA * tnx
        buffers.velocityY[a] -= frictionImpulse * invMassA * tny
        buffers.angularVel[a] -= invInertiaA * (rAX * frictionImpulse * tny - rAY * frictionImpulse * tnx)
        buffers.velocityX[b] += frictionImpulse * invMassB * tnx
        buffers.velocityY[b] += frictionImpulse * invMassB * tny
        buffers.angularVel[b] += invInertiaB * (rBX * frictionImpulse * tny - rBY * frictionImpulse * tnx)
      }
    }

    const correctionMag = Math.max(contact.penetration - SLOP, 0) * POSITION_CORRECTION_PERCENT / invMassSum
    const cx = correctionMag * nx
    const cy = correctionMag * ny
    buffers.positionX[a] -= cx * invMassA
    buffers.positionY[a] -= cy * invMassA
    buffers.positionX[b] += cx * invMassB
    buffers.positionY[b] += cy * invMassB
  }
}

function step(dt) {
  const bpMethod = document.getElementById('broadphase').value
  const npMethod = document.getElementById('narrowphase').value

  const manifolds = collide(buffers, bodyCount, bpMethod, npMethod)

  for (const m of manifolds) {
    resolveCollision(m.bodyA, m.bodyB, m)
  }

  for (let i = 0; i < bodyCount; i++) {
    buffers.positionX[i] += buffers.velocityX[i] * dt
    buffers.positionY[i] += buffers.velocityY[i] * dt
    buffers.angle[i] += buffers.angularVel[i] * dt

    const b = bodyData[i]
    const margin = b.shape === 'circle' ? b.radius : Math.max(buffers.halfExtentX[i], buffers.halfExtentY[i])
    const friction = getFriction()
    const wallRestitution = 1 - friction * 0.4
    const wallAngularDamping = 1 - friction * 0.02

    if (buffers.positionX[i] - margin < 0) {
      buffers.positionX[i] = margin
      buffers.velocityX[i] = Math.abs(buffers.velocityX[i]) * wallRestitution
      buffers.angularVel[i] *= wallAngularDamping
    }
    if (buffers.positionX[i] + margin > W) {
      buffers.positionX[i] = W - margin
      buffers.velocityX[i] = -Math.abs(buffers.velocityX[i]) * wallRestitution
      buffers.angularVel[i] *= wallAngularDamping
    }
    if (buffers.positionY[i] - margin < 0) {
      buffers.positionY[i] = margin
      buffers.velocityY[i] = Math.abs(buffers.velocityY[i]) * wallRestitution
      buffers.angularVel[i] *= wallAngularDamping
    }
    if (buffers.positionY[i] + margin > H) {
      buffers.positionY[i] = H - margin
      buffers.velocityY[i] = -Math.abs(buffers.velocityY[i]) * wallRestitution
      buffers.angularVel[i] *= wallAngularDamping
    }

    const damping = 1 - friction * 0.001
    const angularDamping = 1 - friction * 0.002
    buffers.velocityX[i] *= damping
    buffers.velocityY[i] *= damping
    buffers.angularVel[i] *= angularDamping
  }
}

function drawShape(i, hit) {
  const px = buffers.positionX[i], py = buffers.positionY[i]
  const type = buffers.shapeType[i]
  const b = bodyData[i]
  const colors = SHAPE_COLORS[b.shape] || SHAPE_COLORS.box

  ctx.fillStyle   = hit ? 'rgba(255,80,80,0.25)' : colors.fill
  ctx.strokeStyle = hit ? '#ff5050' : colors.stroke
  ctx.lineWidth   = hit ? 2.5 : 1.5

  if (type === ShapeType.Circle) {
    ctx.beginPath()
    ctx.arc(px, py, buffers.shapeRadius[i], 0, Math.PI * 2)
    ctx.fill()
    ctx.stroke()
  } else if (type === ShapeType.Box) {
    const [c, negS, s] = mat2FromAngle(buffers.angle[i])
    const hx = buffers.halfExtentX[i], hy = buffers.halfExtentY[i]
    const lx = [-hx, hx, hx, -hx], ly = [-hy, -hy, hy, hy]
    ctx.beginPath()
    for (let v = 0; v < 4; v++) {
      const wx = c * lx[v] + negS * ly[v] + px
      const wy = s * lx[v] + c * ly[v] + py
      v === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  } else {
    const count = buffers.shapeVertexCount[i]
    const base = i * MAX_VERTICES_PER_SHAPE
    const [c, negS, s] = mat2FromAngle(buffers.angle[i])
    ctx.beginPath()
    for (let v = 0; v < count; v++) {
      const lvx = buffers.shapeVerticesX[base + v]
      const lvy = buffers.shapeVerticesY[base + v]
      const wx = c * lvx + negS * lvy + px
      const wy = s * lvx + c * lvy + py
      v === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  }
}

function getWorldContactPos(bodyIdx, localX, localY) {
  const [c, negS, s] = mat2FromAngle(buffers.angle[bodyIdx])
  return {
    x: buffers.positionX[bodyIdx] + c * localX + negS * localY,
    y: buffers.positionY[bodyIdx] + s * localX + c * localY,
  }
}

function render() {
  const bpMethod = document.getElementById('broadphase').value
  const npMethod = document.getElementById('narrowphase').value
  const showNormals = document.getElementById('showNormals').checked
  const showContacts = document.getElementById('showContacts').checked

  const t0 = performance.now()
  const pairs = broadphase(buffers, bodyCount, bpMethod)
  let manifolds = []
  if (pairs.length > 0) {
    manifolds = npMethod === 'gjk'
      ? gjkNarrowphase(buffers, pairs)
      : narrowphase(buffers, pairs)
  }
  const elapsed = performance.now() - t0

  const hit = new Uint8Array(bodyCount)
  for (const m of manifolds) { hit[m.bodyA] = 1; hit[m.bodyB] = 1 }

  ctx.clearRect(0, 0, W, H)

  ctx.strokeStyle = 'rgba(255,200,60,0.15)'
  ctx.lineWidth = 1
  for (const p of pairs) {
    ctx.beginPath()
    ctx.moveTo(buffers.positionX[p.a], buffers.positionY[p.a])
    ctx.lineTo(buffers.positionX[p.b], buffers.positionY[p.b])
    ctx.stroke()
  }

  for (let i = 0; i < bodyCount; i++) drawShape(i, hit[i])

  for (const m of manifolds) {
    for (const contact of m.contacts) {
      const wc = getWorldContactPos(m.bodyA, contact.localA.x, contact.localA.y)

      if (showContacts) {
        ctx.fillStyle = '#ffcc00'
        ctx.beginPath()
        ctx.arc(wc.x, wc.y, 4, 0, Math.PI * 2)
        ctx.fill()
      }
      if (showNormals) {
        const len = 30
        ctx.strokeStyle = 'rgba(255,100,100,0.7)'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(wc.x, wc.y)
        ctx.lineTo(wc.x + m.normal.x * len, wc.y + m.normal.y * len)
        ctx.stroke()
        const ax = wc.x + m.normal.x * len
        const ay = wc.y + m.normal.y * len
        const perpX = -m.normal.y, perpY = m.normal.x
        ctx.beginPath()
        ctx.moveTo(ax, ay)
        ctx.lineTo(ax - m.normal.x * 6 + perpX * 4, ay - m.normal.y * 6 + perpY * 4)
        ctx.moveTo(ax, ay)
        ctx.lineTo(ax - m.normal.x * 6 - perpX * 4, ay - m.normal.y * 6 - perpY * 4)
        ctx.stroke()
      }
    }
  }

  return { elapsed, pairs: pairs.length, manifolds: manifolds.length }
}

const WINDOW = 60
const bpTimes = new Float64Array(WINDOW)
const frameDts = new Float64Array(WINDOW)
let ringIdx = 0, samplesFilled = 0

function avg(arr, filled) {
  let s = 0
  const n = Math.min(filled, WINDOW)
  for (let i = 0; i < n; i++) s += arr[i]
  return s / n
}

let last = null
function loop(ts) {
  const dt = last !== null ? ts - last : 0
  last = ts

  if (dt > 0 && document.getElementById('animate').checked)
    step(Math.min(dt / 1000, 0.05))

  const { elapsed, pairs, manifolds } = render()

  bpTimes[ringIdx] = elapsed
  frameDts[ringIdx] = dt > 0 ? dt : 16.67
  ringIdx = (ringIdx + 1) % WINDOW
  samplesFilled++

  const avgBP = avg(bpTimes, samplesFilled)
  const avgDt = avg(frameDts, samplesFilled)
  const fps = avgDt > 0 ? 1000 / avgDt : 0

  const bpMethod = document.getElementById('broadphase').value
  const npMethod = document.getElementById('narrowphase').value
  const bpLabel = bpMethod === 'sap' ? 'SAP' : 'BVH'
  const npLabel = npMethod === 'sat' ? 'SAT' : 'GJK+EPA'
  document.getElementById('stats').textContent =
    `${bpLabel} + ${npLabel} | ${bodyCount} bodies | ${pairs} pairs | ${manifolds} contacts` +
    `  |  time: ${elapsed.toFixed(3)} ms  avg: ${avgBP.toFixed(3)} ms` +
    `  |  fps: ${fps.toFixed(1)}`

  requestAnimationFrame(loop)
}

function resetAll() { ringIdx = 0; samplesFilled = 0; init() }
document.getElementById('reset').addEventListener('click', resetAll)
document.getElementById('bodyCount').addEventListener('change', resetAll)
document.getElementById('shape').addEventListener('change', resetAll)
document.getElementById('broadphase').addEventListener('change', () => { ringIdx = 0; samplesFilled = 0 })
document.getElementById('narrowphase').addEventListener('change', () => { ringIdx = 0; samplesFilled = 0 })

const frictionSlider = document.getElementById('friction')
const massSlider = document.getElementById('mass')
const startSpeedSlider = document.getElementById('startSpeed')
const frictionVal = document.getElementById('frictionVal')
const massVal = document.getElementById('massVal')
const startSpeedVal = document.getElementById('startSpeedVal')

frictionSlider.addEventListener('input', () => { frictionVal.textContent = parseFloat(frictionSlider.value).toFixed(2) })
massSlider.addEventListener('input', () => { massVal.textContent = parseFloat(massSlider.value).toFixed(1) })
startSpeedSlider.addEventListener('input', () => { startSpeedVal.textContent = parseInt(startSpeedSlider.value) })

init()
requestAnimationFrame(loop)
</script>
</body>
</html>
