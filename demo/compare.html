<!-- Bare specifiers for static hosting (node server.js, etc.). Vite rewrites these when using npm run dev. -->
<script type="importmap">
{
  "imports": {
    "@matcha2d/types": "../packages/types/dist/index.js",
    "@matcha2d/physics-rust": "../packages/physics-rust/pkg/matcha2d_physics.js",
    "@matcha2d/world": "../packages/world/dist/index.js",
    "@matcha2d/render": "../packages/render/dist/index.js",
    "@dimforge/rapier2d-compat": "../node_modules/@dimforge/rapier2d-compat/rapier.mjs"
  }
}
</script>
<script type="module">
import { drawNarrowphaseColliderOutlinesCanvas } from '@matcha2d/render'

// ── Scale: physics runs in meters, rendering in pixels ──
const PIXELS_PER_METER = 50
const toMeters = px => px / PIXELS_PER_METER
const toPixels = m => m * PIXELS_PER_METER
const FIXED_DT = 1 / 60

const canvasA = document.getElementById('canvasA')
const canvasB = document.getElementById('canvasB')
const ctxA = canvasA.getContext('2d')
const ctxB = canvasB.getContext('2d')
const W = canvasA.width
const H = canvasA.height
// Inner play area (meters) — derived from canvas so wall layout and worldBounds stay aligned
const ARENA_W = W / PIXELS_PER_METER
const ARENA_H = H / PIXELS_PER_METER

// ── Load both engines in parallel ──
// Matcha: use the same fixed dt as Rapier (`step(FIXED_DT)` once per frame). A smaller `fixedTimestep`
// with the same `step(FIXED_DT)` runs 2× engine steps per frame vs Rapier’s 1× and diverges badly.
const [matchaWorld, rapierModule] = await Promise.all([
  (async () => {
    const { World } = await import('@matcha2d/world')
    return World.create({
      gravity: { x: 0, y: 0 },
      fixedTimestep: FIXED_DT,
      // Inner play area aligned with Rapier wall inner faces (see createMatchaWalls / createRapierWalls).
      worldBounds: {
        minX: 0,
        minY: 0,
        maxX: ARENA_W,
        maxY: ARENA_H,
      },
      velocityIterations: 14,
      internalVelocityIterations: 6,
      positionIterations: 9,
      baumgarteFactor: 0.22,
      penetrationSlop: 0.006,
      maxCorrectiveVelocity: 45.0,
    })
  })(),
  import('@dimforge/rapier2d-compat')
])

// Compat package: default export (dimforge/rapier#811). `init()` may log a deprecation warning because
// the bundle passes an inlined Uint8Array into wasm-bindgen (not a plain options object) — safe to ignore.
const RAPIER = rapierModule.default ?? rapierModule
await RAPIER.init()

let gpuInitialized = false

const rapierWorld = new RAPIER.World({ x: 0, y: 0 })
// Align solver stiffness with Matcha’s iteration counts; CCD + substeps reduce tunneling at ~4ms steps.
rapierWorld.integrationParameters.numSolverIterations = 14
rapierWorld.integrationParameters.numInternalPgsIterations = 4
rapierWorld.maxCcdSubsteps = 8
// Tighter contact correction than defaults so stacks match Matcha resting heights (see wall alignment).
rapierWorld.integrationParameters.normalizedAllowedLinearError = 0.0005
// Fair comparison with Matcha: Rapier otherwise puts settled stacks to sleep (spd → 0) while
// Matcha keeps stepping. Per-body setCanSleep(false) on dynamics disables that (see spawnDynamicBody).

document.getElementById('loading').style.display = 'none'
document.getElementById('viewport').style.display = 'flex'

// ── Seeded RNG ──
let seed = 42
/** Initial seed for the current scene (hidden input + init); not the PRNG state after spawning. */
let lastSceneSeed = 42
function seededRandom() {
  seed = (seed * 16807 + 0) % 2147483647
  return (seed - 1) / 2147483646
}

// ── Shared state ──
let matchaBodies = []
let matchaWalls = []
let rapierBodies = []
let rapierWalls = []
let bodyShapes = []

const SHAPE_COLORS = {
  circle:   { fill: 'rgba(100,180,255,0.18)', stroke: '#64b4ff' },
  box:      { fill: 'rgba(64,180,128,0.18)', stroke: '#40b480' },
  triangle: { fill: 'rgba(255,180,60,0.18)', stroke: '#ffb43c' },
  pentagon: { fill: 'rgba(200,100,255,0.18)', stroke: '#c864ff' },
  hexagon:  { fill: 'rgba(255,100,180,0.18)', stroke: '#ff64b4' },
}

function regularPolygonVerts(sides, radius) {
  const verts = []
  for (let i = 0; i < sides; i++) {
    const angle = (2 * Math.PI * i) / sides - Math.PI / 2
    verts.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius })
  }
  return verts
}

function randomShape() {
  const shapes = ['circle', 'box', 'triangle', 'pentagon', 'hexagon']
  return shapes[Math.floor(seededRandom() * shapes.length)]
}

// ── Rapier Y conversion (Rapier uses Y-up, canvas uses Y-down) ──
// Physics space: Y-up. Canvas space: Y-down, origin top-left.
// Canvas Y = H - physicsY * PIXELS_PER_METER
const toCanvasY = physicsY => H - physicsY * PIXELS_PER_METER
const toCanvasX = physicsX => physicsX * PIXELS_PER_METER

// ── Rapier wall helper ──
function createRapierWalls(restitution, friction) {
  for (const wb of rapierWalls) rapierWorld.removeRigidBody(wb)
  rapierWalls = []

  // Walls in meter space (canvas 530x400 = 10.6m x 8.0m)
  const wallM = {
    w: W / PIXELS_PER_METER,
    h: H / PIXELS_PER_METER,
    t: toMeters(4), // wall thickness
  }
  const wallDescs = [
    { hx: wallM.w / 2 + wallM.t, hy: wallM.t / 2, x: wallM.w / 2, y: -wallM.t / 2 },
    { hx: wallM.w / 2 + wallM.t, hy: wallM.t / 2, x: wallM.w / 2, y: wallM.h + wallM.t / 2 },
    { hx: wallM.t / 2, hy: wallM.h / 2 + wallM.t, x: -wallM.t / 2, y: wallM.h / 2 },
    { hx: wallM.t / 2, hy: wallM.h / 2 + wallM.t, x: wallM.w + wallM.t / 2, y: wallM.h / 2 },
  ]
  for (const wd of wallDescs) {
    const wb = rapierWorld.createRigidBody(
      RAPIER.RigidBodyDesc.fixed().setTranslation(wd.x, wd.y)
    )
    rapierWorld.createCollider(
      RAPIER.ColliderDesc.cuboid(wd.hx, wd.hy)
        .setRestitution(restitution)
        .setFriction(friction),
      wb
    )
    rapierWalls.push(wb)
  }
}

// ── Matcha wall helper ──
function createMatchaWalls(restitution, friction) {
  for (const b of matchaWalls) matchaWorld.destroyBody(b)
  matchaWalls = []

  const wallM = {
    w: W / PIXELS_PER_METER,
    h: H / PIXELS_PER_METER,
    t: toMeters(4),
  }
  // Same centers and half-extents as createRapierWalls (Y-up meters). Previously the bottom/top/side
  // placements differed by one wall thickness, so Matcha’s floor sat ~4px higher than Rapier’s.
  const wallData = [
    { x: wallM.w / 2, y: -wallM.t / 2, hx: wallM.w / 2 + wallM.t, hy: wallM.t / 2 },
    { x: wallM.w / 2, y: wallM.h + wallM.t / 2, hx: wallM.w / 2 + wallM.t, hy: wallM.t / 2 },
    { x: -wallM.t / 2, y: wallM.h / 2, hx: wallM.t / 2, hy: wallM.h / 2 + wallM.t },
    { x: wallM.w + wallM.t / 2, y: wallM.h / 2, hx: wallM.t / 2, hy: wallM.h / 2 + wallM.t },
  ]
  for (const wd of wallData) {
    const wall = matchaWorld.createBody({ positionX: wd.x, positionY: wd.y, type: 'static' })
    matchaWorld.addCollider(wall, { shape: 'cuboid', halfExtentX: wd.hx, halfExtentY: wd.hy, friction, restitution })
    matchaWalls.push(wall)
  }
}

// ── Collider helpers (accept METER-scale dimensions) ──
function addMatchaCollider(body, shapeName, radiusMeters, friction, restitution) {
  switch (shapeName) {
    case 'circle':
      matchaWorld.addCollider(body, { shape: 'ball', radius: radiusMeters, friction, restitution })
      break
    case 'box': {
      const s = radiusMeters * 1.2
      matchaWorld.addCollider(body, { shape: 'cuboid', halfExtentX: s, halfExtentY: s, friction, restitution })
      break
    }
    case 'triangle':
      matchaWorld.addCollider(body, { shape: 'polygon', vertices: regularPolygonVerts(3, radiusMeters), friction, restitution })
      break
    case 'pentagon':
      matchaWorld.addCollider(body, { shape: 'polygon', vertices: regularPolygonVerts(5, radiusMeters), friction, restitution })
      break
    case 'hexagon':
      matchaWorld.addCollider(body, { shape: 'polygon', vertices: regularPolygonVerts(6, radiusMeters), friction, restitution })
      break
    default:
      matchaWorld.addCollider(body, { shape: 'ball', radius: radiusMeters, friction, restitution })
  }
}

function addRapierCollider(body, shapeName, radiusMeters, friction, restitution) {
  let colliderDesc
  switch (shapeName) {
    case 'circle':
      colliderDesc = RAPIER.ColliderDesc.ball(radiusMeters)
      break
    case 'box': {
      const s = radiusMeters * 1.2
      colliderDesc = RAPIER.ColliderDesc.cuboid(s, s)
      break
    }
    case 'triangle': {
      const verts = regularPolygonVerts(3, radiusMeters)
      const flat = []
      for (const v of verts) flat.push(v.x, -v.y)
      colliderDesc = RAPIER.ColliderDesc.convexHull(new Float32Array(flat))
      break
    }
    case 'pentagon': {
      const verts = regularPolygonVerts(5, radiusMeters)
      const flat = []
      for (const v of verts) flat.push(v.x, -v.y)
      colliderDesc = RAPIER.ColliderDesc.convexHull(new Float32Array(flat))
      break
    }
    case 'hexagon': {
      const verts = regularPolygonVerts(6, radiusMeters)
      const flat = []
      for (const v of verts) flat.push(v.x, -v.y)
      colliderDesc = RAPIER.ColliderDesc.convexHull(new Float32Array(flat))
      break
    }
    default:
      colliderDesc = RAPIER.ColliderDesc.ball(radiusMeters)
  }
  colliderDesc.setFriction(friction).setRestitution(restitution)
  rapierWorld.createCollider(colliderDesc, body)
}

/** Max distance from body origin to any collider feature (px); valid for arbitrary rotation (centered shapes). */
function clearanceRadiusPx(shapeName, radiusPx) {
  switch (shapeName) {
    case 'circle':
      return radiusPx
    case 'box':
      return Math.SQRT2 * radiusPx * 1.2
    default:
      return radiusPx
  }
}

// ── Generate body data in PIXEL space (user-facing params) ──
function generateBodyData(bodyCount, shapeSel, startSpeedPx) {
  const bodyData = []
  const placed = []
  const marginPx = 6
  const maxAttemptsPerBody = 4000
  outer: for (let i = 0; i < bodyCount; i++) {
    const shapeName = shapeSel === 'mixed' ? randomShape() : shapeSel
    let radiusPx, cxPx, cyPx
    let ok = false
    for (let attempt = 0; attempt < maxAttemptsPerBody && !ok; attempt++) {
      radiusPx = 15 + seededRandom() * 25
      const r0 = clearanceRadiusPx(shapeName, radiusPx) + marginPx
      cxPx = r0 + seededRandom() * (W - 2 * r0)
      cyPx = r0 + seededRandom() * (H - 2 * r0)
      ok = true
      for (const p of placed) {
        const r1 = clearanceRadiusPx(p.shapeName, p.radiusPx) + marginPx
        const dx = cxPx - p.cxPx
        const dy = cyPx - p.cyPx
        if (dx * dx + dy * dy < (r0 + r1) * (r0 + r1)) {
          ok = false
          break
        }
      }
    }
    if (!ok) break outer
    placed.push({ shapeName, radiusPx, cxPx, cyPx })
    const angle = seededRandom() * Math.PI * 2
    const vxPx = (seededRandom() - 0.5) * startSpeedPx
    const vyPx = (seededRandom() - 0.5) * startSpeedPx
    bodyData.push({ shapeName, radiusPx, cxPx, cyPx, angle, vxPx, vyPx })
  }
  return bodyData
}

// ── Spawn one dynamic body in both engines ──
// Accepts PIXEL-space params, converts to meters internally
function spawnDynamicBody(shapeName, radiusPx, cxPx, cyPx, angle, vxPx, vyPx, friction, restitution) {
  const radiusM = toMeters(radiusPx)
  const cxM = toMeters(cxPx)
  const cyM = toMeters(cyPx)
  const vxM = toMeters(vxPx)
  const vyM = toMeters(vyPx)

  // Matcha2D: physics Y-up, canvas Y-down → cyM is already in physics space
  const mb = matchaWorld.createBody({ positionX: cxM, positionY: cyM, angle, type: 'dynamic' })
  addMatchaCollider(mb, shapeName, radiusM, friction, restitution)
  matchaWorld.setBodyVelocity(mb, vxM, vyM)
  matchaBodies.push(mb)

  // Rapier: Y-up physics, same meter values
  const rb = rapierWorld.createRigidBody(
    RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(cxM, cyM)
      .setRotation(-angle)
      .setLinvel(vxM, vyM)
      .setCanSleep(false)
      .setCcdEnabled(true)
      .setSoftCcdPrediction(Math.max(radiusM * 0.5, 0.02))
  )
  addRapierCollider(rb, shapeName, radiusM, friction, restitution)
  rapierBodies.push(rb)

  // Store pixel-scale radius for rendering, shape name
  bodyShapes.push({ shape: shapeName, radiusPx })
}

// ── Scene builders ──
function buildBounceScene(bodyCount, shapeSel, friction, restitution, startSpeedPx) {
  const bodyData = generateBodyData(bodyCount, shapeSel, startSpeedPx)
  for (const bd of bodyData) {
    spawnDynamicBody(bd.shapeName, bd.radiusPx, bd.cxPx, bd.cyPx, bd.angle, bd.vxPx, bd.vyPx, friction, restitution)
  }
}

function buildStackScene(bodyCount, friction, restitution) {
  const boxSizePx = 20
  const cols = Math.min(Math.ceil(Math.sqrt(bodyCount * 2)), 8)
  const rows = Math.ceil(bodyCount / cols)
  let count = 0
  for (let r = 0; r < rows && count < bodyCount; r++) {
    for (let c = 0; c < cols && count < bodyCount; c++) {
      const xPx = W / 2 - (cols - 1) * boxSizePx + c * boxSizePx * 2
      const yPx = H - toPixels(toMeters(20)) - boxSizePx - r * boxSizePx * 2
      spawnDynamicBody('box', boxSizePx / 1.2, xPx, yPx, 0, 0, 0, friction, restitution)
      count++
    }
  }
}

function buildPyramidScene(bodyCount, friction, restitution) {
  const boxSizePx = 18
  let count = 0
  let row = 0
  while (count < bodyCount) {
    const colsInRow = row + 1
    for (let c = 0; c < colsInRow && count < bodyCount; c++) {
      const xPx = W / 2 - (colsInRow - 1) * boxSizePx + c * boxSizePx * 2
      const yPx = H - toPixels(toMeters(20)) - boxSizePx - row * boxSizePx * 2
      spawnDynamicBody('box', boxSizePx / 1.2, xPx, yPx, 0, 0, 0, friction, restitution)
      count++
    }
    row++
  }
}

function buildSpinScene(bodyCount, friction, restitution, startSpeedPx) {
  const centerM = { x: W / PIXELS_PER_METER / 2, y: H / PIXELS_PER_METER / 2 }
  const obstacleM = toMeters(40)
  const centerCxPx = W / 2
  const centerCyPx = H / 2
  /** Canvas-px distance from arena center to farthest corner of the axis-aligned obstacle (same as sqrt(2)*halfSidePx). */
  const obstacleCornerDistPx = Math.SQRT2 * toPixels(obstacleM)

  // Static center obstacle for Matcha2D
  const mc = matchaWorld.createBody({ positionX: centerM.x, positionY: centerM.y, type: 'static' })
  matchaWorld.addCollider(mc, { shape: 'cuboid', halfExtentX: obstacleM, halfExtentY: obstacleM, friction, restitution })
  matchaWalls.push(mc)

  // Static center obstacle for Rapier
  const rc = rapierWorld.createRigidBody(
    RAPIER.RigidBodyDesc.fixed().setTranslation(centerM.x, centerM.y)
  )
  rapierWorld.createCollider(
    RAPIER.ColliderDesc.cuboid(obstacleM, obstacleM).setFriction(friction).setRestitution(restitution), rc
  )
  rapierWalls.push(rc)

  const spinShapes = ['box', 'circle', 'triangle', 'pentagon']
  const placed = []
  const marginPx = 6
  const maxAttemptsPerBody = 4000
  outer: for (let i = 0; i < bodyCount; i++) {
    let shapeName, radiusPx, xPx, yPx, bodyAngle, vxPx, vyPx
    let ok = false
    for (let attempt = 0; attempt < maxAttemptsPerBody && !ok; attempt++) {
      shapeName = spinShapes[Math.floor(seededRandom() * spinShapes.length)]
      radiusPx = 12 + seededRandom() * 18
      bodyAngle = seededRandom() * Math.PI * 2
      const cr = clearanceRadiusPx(shapeName, radiusPx) + marginPx
      const minDistPx = obstacleCornerDistPx + cr
      const maxDistPx = Math.min(W / 2, H / 2) - cr - 4
      if (minDistPx >= maxDistPx) continue
      const distPx = minDistPx + seededRandom() * (maxDistPx - minDistPx)
      const ang = seededRandom() * Math.PI * 2
      xPx = centerCxPx + Math.cos(ang) * distPx
      yPx = centerCyPx + Math.sin(ang) * distPx
      const dcx = xPx - centerCxPx
      const dcy = yPx - centerCyPx
      const dCenter = Math.sqrt(dcx * dcx + dcy * dcy)
      if (dCenter < obstacleCornerDistPx + clearanceRadiusPx(shapeName, radiusPx) + marginPx) continue
      ok = true
      for (const p of placed) {
        const r1 = clearanceRadiusPx(p.shapeName, p.radiusPx) + marginPx
        const dx = xPx - p.xPx
        const dy = yPx - p.yPx
        if (dx * dx + dy * dy < (cr + r1) * (cr + r1)) {
          ok = false
          break
        }
      }
    }
    if (!ok) break outer
    placed.push({ shapeName, radiusPx, xPx, yPx })
    const speedPx = startSpeedPx * 0.5
    const txPx = centerCxPx - xPx
    const tyPx = centerCyPx - yPx
    const tlen = Math.sqrt(txPx * txPx + tyPx * tyPx) || 1
    vxPx = (txPx / tlen) * speedPx + (-tyPx / tlen) * speedPx * 0.5
    vyPx = (tyPx / tlen) * speedPx + (txPx / tlen) * speedPx * 0.5
    spawnDynamicBody(shapeName, radiusPx, xPx, yPx, bodyAngle, vxPx, vyPx, friction, restitution)
  }
}

// ── Init both engines with identical random data ──
async function init() {
  seed = parseInt(document.getElementById('seed')?.value, 10) || seed
  lastSceneSeed = seed
  const friction = parseFloat(document.getElementById('friction').value)
  const restitution = parseFloat(document.getElementById('restitution').value)
  // Inelastic walls when restitution is 0 — avoids artificial bounce that fights settling
  const wallRestitution = restitution > 0 ? restitution : 0
  const bodyCount = parseInt(document.getElementById('bodyCount').value)
  const scene = document.getElementById('scene').value
  const startSpeedPx = parseFloat(document.getElementById('startSpeed').value)
  const gravityPx = parseFloat(document.getElementById('gravity').value)
  const gravityM = toMeters(gravityPx)

  // Clean up
  for (const b of matchaBodies) matchaWorld.destroyBody(b)
  for (const b of matchaWalls) matchaWorld.destroyBody(b)
  matchaBodies = []
  matchaWalls = []

  for (const b of rapierBodies) rapierWorld.removeRigidBody(b)
  for (const b of rapierWalls) rapierWorld.removeRigidBody(b)
  rapierBodies = []
  rapierWalls = []

  bodyShapes = []

  // Set gravity for both engines (in meters, Y-up: negative Y = downward)
  matchaWorld.setGravity(0, -gravityM)
  rapierWorld.gravity = { x: 0, y: -gravityM }

  matchaWorld.setWorldBounds({
    minX: 0,
    minY: 0,
    maxX: ARENA_W,
    maxY: ARENA_H,
  })

  // Create walls for both engines (in meters)
  createMatchaWalls(wallRestitution, friction)
  createRapierWalls(wallRestitution, friction)

  // Build scene
  switch (scene) {
    case 'stack':   buildStackScene(bodyCount, friction, restitution); break
    case 'pyramid': buildPyramidScene(bodyCount, friction, restitution); break
    case 'spin':    buildSpinScene(bodyCount, friction, restitution, startSpeedPx); break
    case 'mixed':   buildBounceScene(bodyCount, 'mixed', friction, restitution, startSpeedPx); break
    default:        buildBounceScene(bodyCount, 'box', friction, restitution, startSpeedPx); break
  }
}

// ── Matcha2D step (fixed timestep) ──
function stepMatcha() {
  if (!matchaWorld) return
  matchaWorld.step(FIXED_DT)
}

// ── Rapier step (fixed timestep) ──
function stepRapier() {
  if (!rapierWorld) return
  rapierWorld.timestep = FIXED_DT
  rapierWorld.step()
}

// ── Drawing ──
/**
 * Physics-local offsets (Y-up, same as collider / `regularPolygonVerts`) → canvas pixels when the
 * body center is already `(toCanvasX(pxM), toCanvasY(pyM))`. Matches world vertex then `H - y·ppm`.
 */
function physicsLocalToCanvasPixel(cpx, cpy, physicsAngleRad, lx, ly) {
  const c = Math.cos(physicsAngleRad), s = Math.sin(physicsAngleRad)
  return {
    x: cpx + c * lx - s * ly,
    y: cpy - s * lx - c * ly,
  }
}

function drawBody(ctx, cpx, cpy, physicsAngleRad, shapeName, radiusPx) {
  if (shapeName === 'floor') return
  const colors = SHAPE_COLORS[shapeName] || SHAPE_COLORS.box
  ctx.fillStyle = colors.fill
  ctx.strokeStyle = colors.stroke
  ctx.lineWidth = 1.5

  if (shapeName === 'circle') {
    ctx.beginPath()
    ctx.arc(cpx, cpy, radiusPx, 0, Math.PI * 2)
    ctx.fill()
    ctx.stroke()
  } else if (shapeName === 'box') {
    const s = radiusPx * 1.2
    const lx = [-s, s, s, -s], ly = [-s, -s, s, s]
    ctx.beginPath()
    for (let v = 0; v < 4; v++) {
      const p = physicsLocalToCanvasPixel(cpx, cpy, physicsAngleRad, lx[v], ly[v])
      v === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  } else {
    const sides = { triangle: 3, pentagon: 5, hexagon: 6 }[shapeName] || 4
    const verts = regularPolygonVerts(sides, radiusPx)
    ctx.beginPath()
    for (let v = 0; v < verts.length; v++) {
      const p = physicsLocalToCanvasPixel(cpx, cpy, physicsAngleRad, verts[v].x, verts[v].y)
      v === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  }
}

function drawVertices(ctx, cpx, cpy, physicsAngleRad, shapeName, radiusPx) {
  if (shapeName === 'floor') return
  ctx.fillStyle = '#ff0'

  let verts
  if (shapeName === 'circle') {
    verts = []
    for (let a = 0; a < 8; a++) {
      const ang = (Math.PI * 2 * a) / 8
      verts.push({ x: Math.cos(ang) * radiusPx, y: Math.sin(ang) * radiusPx })
    }
  } else if (shapeName === 'box') {
    const s = radiusPx * 1.2
    verts = [{ x: -s, y: -s }, { x: s, y: -s }, { x: s, y: s }, { x: -s, y: s }]
  } else {
    const sides = { triangle: 3, pentagon: 5, hexagon: 6 }[shapeName] || 4
    verts = regularPolygonVerts(sides, radiusPx)
  }

  for (const v of verts) {
    const p = physicsLocalToCanvasPixel(cpx, cpy, physicsAngleRad, v.x, v.y)
    ctx.beginPath()
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2)
    ctx.fill()
  }
}

function renderMatcha() {
  ctxA.clearRect(0, 0, W, H)

  // Walls: placeholder quads were misleading (not real collider AABBs). Use narrowphase overlay for truth.
  for (let i = 0; i < matchaWalls.length; i++) {
    const [pxM, pyM] = matchaWorld.getBodyPosition(matchaWalls[i])
    const cpx = toCanvasX(pxM)
    const cpy = toCanvasY(pyM)
    ctxA.fillStyle = 'rgba(255,255,255,0.02)'
    ctxA.strokeStyle = '#333'
    ctxA.lineWidth = 1
    const wallPx = toPixels(toMeters(4))
    ctxA.fillRect(cpx - wallPx, cpy - wallPx, wallPx * 2, wallPx * 2)
    ctxA.strokeRect(cpx - wallPx, cpy - wallPx, wallPx * 2, wallPx * 2)
  }

  // Draw bodies (physics meters → canvas pixels)
  for (let i = 0; i < matchaBodies.length; i++) {
    const [pxM, pyM] = matchaWorld.getBodyPosition(matchaBodies[i])
    const angle = matchaWorld.getBodyAngle(matchaBodies[i])
    const b = bodyShapes[i]
    const cpx = toCanvasX(pxM)
    const cpy = toCanvasY(pyM)
    drawBody(ctxA, cpx, cpy, angle, b.shape, b.radiusPx)
    if (document.getElementById('showVertices').checked)
      drawVertices(ctxA, cpx, cpy, angle, b.shape, b.radiusPx)
  }

  if (document.getElementById('showNarrowphase').checked) {
    const outlines = matchaWorld.getNarrowphaseColliderOutlines()
    drawNarrowphaseColliderOutlinesCanvas(ctxA, outlines, {
      pixelsPerMeter: PIXELS_PER_METER,
      canvasHeight: H,
      physicsYUp: true,
      lineWidth: 2,
    })
  }
}

function renderRapier() {
  ctxB.clearRect(0, 0, W, H)
  for (let i = 0; i < rapierBodies.length; i++) {
    const pos = rapierBodies[i].translation()
    const angle = rapierBodies[i].rotation()
    const b = bodyShapes[i]
    const cpx = toCanvasX(pos.x)
    const cpy = toCanvasY(pos.y)
    drawBody(ctxB, cpx, cpy, angle, b.shape, b.radiusPx)
    if (document.getElementById('showVertices').checked)
      drawVertices(ctxB, cpx, cpy, angle, b.shape, b.radiusPx)
  }
}

// ── FPS tracking ──
const WINDOW = 60
const frameDtsA = new Float64Array(WINDOW)
const frameDtsB = new Float64Array(WINDOW)
let ringIdx = 0, samplesFilled = 0

// ── Diagnostic state ──
let diagFrameCount = 0
const DIAG_LOG_INTERVAL = 60
const matchaSpeedHistory = []
const rapierSpeedHistory = []
const DIAG_HISTORY_LEN = 120

/** Mean of linear speeds with top/bottom 10% removed (reduces tunneling outlier skew). */
function trimmedMean(arr) {
  if (arr.length === 0) return 0
  const sorted = [...arr].sort((a, b) => a - b)
  const n = sorted.length
  const drop = Math.max(0, Math.floor(n * 0.1))
  const slice = sorted.slice(drop, Math.max(drop + 1, n - drop))
  return slice.reduce((a, b) => a + b, 0) / slice.length
}

function computeBodyStats(world, bodyHandles, bodyShapes) {
  let totalSpeed = 0, maxSpeed = 0, totalAngVel = 0, maxAngVel = 0
  const speeds = []
  const angVels = []
  for (let i = 0; i < bodyHandles.length; i++) {
    const [vx, vy] = world.getBodyVelocity(bodyHandles[i])
    const speed = Math.sqrt(vx * vx + vy * vy)
    speeds.push(speed)
    totalSpeed += speed
    if (speed > maxSpeed) maxSpeed = speed
    const angVel = world.getBodyAngularVelocity(bodyHandles[i])
    const absAngVel = Math.abs(angVel)
    angVels.push(angVel)
    totalAngVel += absAngVel
    if (absAngVel > maxAngVel) maxAngVel = absAngVel
  }
  const n = Math.max(1, bodyHandles.length)
  return {
    avgSpeed: totalSpeed / n,
    avgSpeedTrimmed: trimmedMean(speeds),
    maxSpeed,
    speeds,
    avgAngVel: totalAngVel / n,
    avgAngVelTrimmed: trimmedMean(angVels.map(Math.abs)),
    maxAngVel,
    angVels,
  }
}

function computeRapierBodyStats(bodies) {
  let totalSpeed = 0, maxSpeed = 0, totalAngVel = 0, maxAngVel = 0
  const speeds = []
  const angVels = []
  for (const body of bodies) {
    const vel = body.linvel()
    const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y)
    speeds.push(speed)
    totalSpeed += speed
    if (speed > maxSpeed) maxSpeed = speed
    const angVel = body.angvel()
    const absAngVel = Math.abs(angVel)
    angVels.push(angVel)
    totalAngVel += absAngVel
    if (absAngVel > maxAngVel) maxAngVel = absAngVel
  }
  const n = Math.max(1, bodies.length)
  const absAng = angVels.map(Math.abs)
  return {
    avgSpeed: totalSpeed / n,
    avgSpeedTrimmed: trimmedMean(speeds),
    maxSpeed,
    speeds,
    avgAngVel: totalAngVel / n,
    avgAngVelTrimmed: trimmedMean(absAng),
    maxAngVel,
    angVels,
  }
}

// Circle-proxy overlap (NOT true polygon SAT overlap): center distance vs sum of radii.
// Polygons/boxes use radiusPx*1.2 — many false positives. Trust engine pen / contacts for physics quality.
function checkBodyOverlaps(world, bodyHandles, bodyShapes) {
  let overlaps = 0
  let maxOverlapDist = 0
  const positions = []
  for (let i = 0; i < bodyHandles.length; i++) {
    positions.push(world.getBodyPosition(bodyHandles[i]))
  }
  for (let i = 0; i < bodyHandles.length; i++) {
    const r1M = toMeters(bodyShapes[i].radiusPx * (bodyShapes[i].shape === 'circle' ? 1 : 1.2))
    for (let j = i + 1; j < bodyHandles.length; j++) {
      const r2M = toMeters(bodyShapes[j].radiusPx * (bodyShapes[j].shape === 'circle' ? 1 : 1.2))
      const dx = positions[j][0] - positions[i][0]
      const dy = positions[j][1] - positions[i][1]
      const dist = Math.sqrt(dx * dx + dy * dy)
      const minDist = r1M + r2M
      if (dist < minDist) {
        overlaps++
        const overlap = minDist - dist
        if (overlap > maxOverlapDist) maxOverlapDist = overlap
      }
    }
  }
  return { overlaps, maxOverlapDist }
}

function checkRapierOverlaps(bodies, bodyShapes) {
  let overlaps = 0
  let maxOverlapDist = 0
  for (let i = 0; i < bodies.length; i++) {
    const r1M = toMeters(bodyShapes[i].radiusPx * (bodyShapes[i].shape === 'circle' ? 1 : 1.2))
    const posI = bodies[i].translation()
    for (let j = i + 1; j < bodies.length; j++) {
      const r2M = toMeters(bodyShapes[j].radiusPx * (bodyShapes[j].shape === 'circle' ? 1 : 1.2))
      const posJ = bodies[j].translation()
      const dx = posJ.x - posI.x
      const dy = posJ.y - posI.y
      const dist = Math.sqrt(dx * dx + dy * dy)
      const minDist = r1M + r2M
      if (dist < minDist) {
        overlaps++
        const overlap = minDist - dist
        if (overlap > maxOverlapDist) maxOverlapDist = overlap
      }
    }
  }
  return { overlaps, maxOverlapDist }
}

function colorCode(val, warnThresh, errThresh, invert = false) {
  if (!invert) {
    if (val >= errThresh) return 'diag-err'
    if (val >= warnThresh) return 'diag-warn'
    return 'diag-ok'
  } else {
    if (val <= errThresh) return 'diag-err'
    if (val <= warnThresh) return 'diag-warn'
    return 'diag-ok'
  }
}

function updateDiagnostics(dtSec) {
  diagFrameCount++

  const mStats = computeBodyStats(matchaWorld, matchaBodies, bodyShapes)
  const mOverlaps = checkBodyOverlaps(matchaWorld, matchaBodies, bodyShapes)

  const rStats = computeRapierBodyStats(rapierBodies)
  const rOverlaps = checkRapierOverlaps(rapierBodies, bodyShapes)

  let matchaContacts = 0, matchaMaxPen = 0, matchaDebugDump = ''
  try {
    matchaContacts = matchaWorld.contactPointCount
    matchaMaxPen = matchaWorld.maxPenetration
    matchaDebugDump = matchaWorld.debugDump
  } catch (e) {
    // Diagnostics not yet available
  }

  matchaSpeedHistory.push(mStats.avgSpeedTrimmed)
  rapierSpeedHistory.push(rStats.avgSpeedTrimmed)
  if (matchaSpeedHistory.length > DIAG_HISTORY_LEN) matchaSpeedHistory.shift()
  if (rapierSpeedHistory.length > DIAG_HISTORY_LEN) rapierSpeedHistory.shift()

  function speedTrend(history) {
    if (history.length < 10) return 0
    const recent = history.slice(-10).reduce((a, b) => a + b, 0) / 10
    const older = history.slice(0, 10).reduce((a, b) => a + b, 0) / 10
    return recent - older
  }
  const mTrend = speedTrend(matchaSpeedHistory)
  const rTrend = speedTrend(rapierSpeedHistory)

  const diagMatchaLeft = document.getElementById('diagMatchaLeft')
  const diagMatchaRight = document.getElementById('diagMatchaRight')
  const diagRapierLeft = document.getElementById('diagRapierLeft')
  const diagRapierRight = document.getElementById('diagRapierRight')

  // Overlap display: convert meters to pixels for readability
  const mOverlapPx = toPixels(mOverlaps.maxOverlapDist)
  const rOverlapPx = toPixels(rOverlaps.maxOverlapDist)

  diagMatchaLeft.innerHTML = `
    <div>Avg speed: <span class="diag-val">${mStats.avgSpeed.toFixed(2)} m/s</span> <span style="color:#666">(trim ${mStats.avgSpeedTrimmed.toFixed(2)})</span></div>
    <div>Max speed: <span class="diag-val">${mStats.maxSpeed.toFixed(2)} m/s</span></div>
    <div>Avg ang vel: <span class="diag-val">${mStats.avgAngVel.toFixed(3)} rad/s</span> <span style="color:#666">(trim ${mStats.avgAngVelTrimmed.toFixed(3)})</span></div>
    <div>Max ang vel: <span class="diag-val">${mStats.maxAngVel.toFixed(3)} rad/s</span></div>
    <div>Speed trend: <span class="${colorCode(Math.abs(mTrend), 0.5, 2)}">${mTrend > 0 ? '+' : ''}${mTrend.toFixed(3)}</span></div>
    <div title="Circle-proxy pair count (not SAT); use max penetration for real overlap">Proxy overlaps: <span class="${colorCode(mOverlaps.overlaps, 1, 3)}">${mOverlaps.overlaps}</span> (max: ${mOverlapPx.toFixed(1)}px)</div>
  `
  diagMatchaRight.innerHTML = `
    <div>Contacts (pts): <span class="diag-val">${matchaContacts}</span> <span style="color:#666">(primary)</span></div>
    <div>Max penetration: <span class="${colorCode(matchaMaxPen, 0.02, 0.1)}">${(matchaMaxPen * 100).toFixed(2)} cm</span> <span style="color:#666">(primary)</span></div>
    <div style="color:#666;word-break:break-all">${matchaDebugDump}</div>
  `
  diagRapierLeft.innerHTML = `
    <div>Avg speed: <span class="diag-val">${rStats.avgSpeed.toFixed(2)} m/s</span> <span style="color:#666">(trim ${rStats.avgSpeedTrimmed.toFixed(2)})</span></div>
    <div>Max speed: <span class="diag-val">${rStats.maxSpeed.toFixed(2)} m/s</span></div>
    <div>Avg ang vel: <span class="diag-val">${rStats.avgAngVel.toFixed(3)} rad/s</span> <span style="color:#666">(trim ${rStats.avgAngVelTrimmed.toFixed(3)})</span></div>
    <div>Max ang vel: <span class="diag-val">${rStats.maxAngVel.toFixed(3)} rad/s</span></div>
    <div>Speed trend: <span class="${colorCode(Math.abs(rTrend), 0.5, 2)}">${rTrend > 0 ? '+' : ''}${rTrend.toFixed(3)}</span></div>
    <div title="Circle-proxy pair count (not SAT)">Proxy overlaps: <span class="${colorCode(rOverlaps.overlaps, 1, 3)}">${rOverlaps.overlaps}</span> (max: ${rOverlapPx.toFixed(1)}px)</div>
  `
  diagRapierRight.innerHTML = `
    <div>dt: <span class="diag-val">${(dtSec * 1000).toFixed(2)} ms</span></div>
    <div>Engine step: <span class="diag-val">${(FIXED_DT * 1000).toFixed(1)} ms (fixed)</span></div>
  `

  if (diagFrameCount <= 5 || diagFrameCount % DIAG_LOG_INTERVAL === 0) {
    console.log(
      `[Frame ${diagFrameCount}] ` +
      `Matcha: spd=${mStats.avgSpeed.toFixed(2)} trim=${mStats.avgSpeedTrimmed.toFixed(2)} angvel=${mStats.avgAngVel.toFixed(3)} proxyOv=${mOverlaps.overlaps} pen=${(matchaMaxPen*100).toFixed(2)}cm contacts=${matchaContacts} | ` +
      `Rapier: spd=${rStats.avgSpeed.toFixed(2)} trim=${rStats.avgSpeedTrimmed.toFixed(2)} angvel=${rStats.avgAngVel.toFixed(3)} proxyOv=${rOverlaps.overlaps} | ` +
      `dt=${(dtSec*1000).toFixed(2)}ms`
    )
  }

  if (diagFrameCount % 120 === 0) {
    console.group(`[Frame ${diagFrameCount}] Per-body detail`)
    for (let i = 0; i < matchaBodies.length; i++) {
      const [mxM, myM] = matchaWorld.getBodyPosition(matchaBodies[i])
      const [mvxM, mvyM] = matchaWorld.getBodyVelocity(matchaBodies[i])
      const msM = Math.sqrt(mvxM*mvxM + mvyM*mvyM)
      const mAngVel = matchaWorld.getBodyAngularVelocity(matchaBodies[i])
      const rapierPos = rapierBodies[i].translation()
      const rapierVel = rapierBodies[i].linvel()
      const rsM = Math.sqrt(rapierVel.x*rapierVel.x + rapierVel.y*rapierVel.y)
      const rAngVel = rapierBodies[i].angvel()
      console.log(
        `Body ${i} (${bodyShapes[i].shape}): ` +
        `Matcha=(${toPixels(mxM).toFixed(1)},${toPixels(myM).toFixed(1)}) v=(${toPixels(mvxM).toFixed(1)},${toPixels(mvyM).toFixed(1)}) |${toPixels(msM).toFixed(1)}px/s| av=${mAngVel.toFixed(3)} ` +
        `Rapier=(${toPixels(rapierPos.x).toFixed(1)},${toPixels(rapierPos.y).toFixed(1)}) v=(${toPixels(rapierVel.x).toFixed(1)},${toPixels(rapierVel.y).toFixed(1)}) |${toPixels(rsM).toFixed(1)}px/s| av=${rAngVel.toFixed(3)}`
      )
    }
    console.groupEnd()
  }
}

function avg(arr, filled) {
  let s = 0
  const n = Math.min(filled, WINDOW)
  for (let i = 0; i < n; i++) s += arr[i]
  return s / n
}

// ── Fixed timestep accumulator ──
let accumulator = 0
let last = null
function loop(ts) {
  const dt = last !== null ? ts - last : 0
  last = ts
  const dtSec = Math.min(dt / 1000, 0.1)

  const animate = document.getElementById('animate').checked

  // Accumulate time and step physics at fixed rate
  let steps = 0
  if (animate && matchaBodies.length > 0) {
    accumulator += dtSec
    const maxSteps = 5 // prevent spiral of death
    while (accumulator >= FIXED_DT && steps < maxSteps) {
      stepMatcha()
      stepRapier()
      accumulator -= FIXED_DT
      steps++
    }
    if (accumulator > FIXED_DT * maxSteps) {
      accumulator = 0 // reset if too far behind
    }
  }

  renderMatcha()
  renderRapier()

  updateDiagnostics(dtSec)

  frameDtsA[ringIdx] = dt > 0 ? dt : 16.67
  ringIdx = (ringIdx + 1) % WINDOW
  samplesFilled++
  const avgDt = avg(frameDtsA, samplesFilled)
  const fps = avgDt > 0 ? 1000 / avgDt : 0

  document.getElementById('statsA').textContent =
    `${matchaBodies.length} bodies | step: ${(steps || 0)}/${FIXED_DT * 1000}ms | fps: ${fps.toFixed(1)}`
  document.getElementById('statsB').textContent =
    `${rapierBodies.length} bodies | fixed: ${(FIXED_DT * 1000).toFixed(1)}ms | fps: ${fps.toFixed(1)}`

  requestAnimationFrame(loop)
}
