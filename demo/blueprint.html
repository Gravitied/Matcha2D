<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matcha2D — Blueprint (Rapier) Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    h1 { font-size: 16px; color: #d5a8a8; letter-spacing: 2px; }
    h1 a { color: #d5a8a8; text-decoration: none; }
    h1 a:hover { text-decoration: underline; }
    #controls { display: flex; gap: 16px; align-items: center; font-size: 13px; flex-wrap: wrap; justify-content: center; }
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    select, button { background: #222; color: #eee; border: 1px solid #444; padding: 4px 10px; font-family: monospace; cursor: pointer; }
    button:hover { background: #333; }
    input[type="range"] { width: 80px; accent-color: #d5a8a8; }
    .slider-val { min-width: 32px; text-align: right; color: #d5a8a8; }
    .slider-group { display: flex; align-items: center; gap: 4px; }
    canvas { border: 1px solid #333; }
    #stats { font-size: 12px; color: #888; min-height: 1.4em; text-align: center; }
    #loading { color: #d5a8a8; font-size: 14px; }
  </style>
</head>
<body>
  <h1><a href="demo-hub.html">Matcha2D</a> — Blueprint (Rapier) Demo</h1>
  <div id="controls">
    <label>Shape:
      <select id="shape">
        <option value="circle">Circle</option>
        <option value="box" selected>Box</option>
        <option value="triangle">Triangle</option>
        <option value="pentagon">Pentagon</option>
        <option value="hexagon">Hexagon</option>
        <option value="mixed">Mixed</option>
      </select>
    </label>
    <label>Bodies:
      <select id="bodyCount">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </label>
    <button id="reset">Reset</button>
    <label><input type="checkbox" id="animate" checked> Animate</label>
    <label><input type="checkbox" id="showVertices"> Show Vertices</label>
    <label class="slider-group">Friction:
      <input type="range" id="friction" min="0" max="1" step="0.05" value="0.3">
      <span class="slider-val" id="frictionVal">0.30</span>
    </label>
    <label class="slider-group">Mass:
      <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1">
      <span class="slider-val" id="massVal">1.0</span>
    </label>
    <label class="slider-group">Start Speed:
      <input type="range" id="startSpeed" min="10" max="500" step="10" value="150">
      <span class="slider-val" id="startSpeedVal">150</span>
    </label>
  </div>
  <div id="loading">Loading Rapier WASM engine...</div>
  <canvas id="canvas" width="800" height="500" style="display:none"></canvas>
  <div id="stats"></div>

<script type="importmap">
{
  "imports": {
    "@dimforge/rapier2d-compat": "../node_modules/@dimforge/rapier2d-compat/rapier.mjs"
  }
}
</script>
<script type="module">
const rapierModule = await import('@dimforge/rapier2d-compat')
await rapierModule.init({})
const RAPIER = rapierModule

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const W = canvas.width, H = canvas.height

let rapierWorld = null
let rigidBodies = []
let bodyShapes = []
let wallColliders = []

const SHAPE_COLORS = {
  circle:   { fill: 'rgba(100,180,255,0.18)', stroke: '#64b4ff' },
  box:      { fill: 'rgba(64,180,128,0.18)', stroke: '#40b480' },
  triangle: { fill: 'rgba(255,180,60,0.18)', stroke: '#ffb43c' },
  pentagon: { fill: 'rgba(200,100,255,0.18)', stroke: '#c864ff' },
  hexagon:  { fill: 'rgba(255,100,180,0.18)', stroke: '#ff64b4' },
}

function regularPolygonVerts(sides, radius) {
  const verts = []
  for (let i = 0; i < sides; i++) {
    const angle = (2 * Math.PI * i) / sides - Math.PI / 2
    verts.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius })
  }
  return verts
}

function polygonFlatVerts(sides, radius) {
  const verts = regularPolygonVerts(sides, radius)
  const flat = []
  for (const v of verts) flat.push(v.x, -v.y) // flip Y for Rapier Y-up
  return flat
}

function randomShape() {
  const shapes = ['circle', 'box', 'triangle', 'pentagon', 'hexagon']
  return shapes[Math.floor(Math.random() * shapes.length)]
}

function clearanceRadiusPx(shapeName, radius) {
  switch (shapeName) {
    case 'circle':
      return radius
    case 'box':
      return Math.SQRT2 * radius * 1.2
    default:
      return radius
  }
}

function toRapierY(canvasY) { return H - canvasY }
function toCanvasY(rapierY) { return H - rapierY }

function createWalls(restitution) {
  // Remove old walls
  for (const w of wallColliders) rapierWorld.removeCollider(w, true)
  wallColliders = []

  const wallDescs = [
    // bottom (y=0 in canvas = y=0 in Rapier)
    { hx: W / 2, hy: 10, x: W / 2, y: -10 },
    // top (y=H in canvas = y=H in Rapier)
    { hx: W / 2, hy: 10, x: W / 2, y: H + 10 },
    // left (x=0)
    { hx: 10, hy: H / 2, x: -10, y: H / 2 },
    // right (x=W)
    { hx: 10, hy: H / 2, x: W + 10, y: H / 2 },
  ]

  for (const wd of wallDescs) {
    const wallBody = rapierWorld.createRigidBody(
      RAPIER.RigidBodyDesc.fixed().setTranslation(wd.x, wd.y)
    )
    const wallCollider = RAPIER.ColliderDesc.cuboid(wd.hx, wd.hy)
      .setRestitution(restitution)
      .setFriction(parseFloat(document.getElementById('friction').value))
    rapierWorld.createCollider(wallCollider, wallBody)
    wallColliders.push(wallBody)
  }
}

async function init() {
  if (!rapierWorld) {
    rapierWorld = new RAPIER.World({ x: 0, y: 0 })
    document.getElementById('loading').style.display = 'none'
    canvas.style.display = 'block'
  }

  const friction = parseFloat(document.getElementById('friction').value)
  const wallRestitution = 1 - friction * 0.4

  // Create walls
  createWalls(wallRestitution)

  // Remove old bodies
  for (const b of rigidBodies) {
    rapierWorld.removeRigidBody(b)
  }
  rigidBodies = []
  bodyShapes = []

  const bodyCount = parseInt(document.getElementById('bodyCount').value)
  const shapeSel = document.getElementById('shape').value
  const startSpeed = parseFloat(document.getElementById('startSpeed').value)

  const placed = []
  const margin = 6
  const maxAttempts = 4000
  outer: for (let i = 0; i < bodyCount; i++) {
    const shapeName = shapeSel === 'mixed' ? randomShape() : shapeSel
    let radius, cx, cy
    let ok = false
    for (let attempt = 0; attempt < maxAttempts && !ok; attempt++) {
      radius = 15 + Math.random() * 25
      const r0 = clearanceRadiusPx(shapeName, radius) + margin
      cx = r0 + Math.random() * (W - 2 * r0)
      cy = r0 + Math.random() * (H - 2 * r0)
      ok = true
      for (const p of placed) {
        const r1 = clearanceRadiusPx(p.shapeName, p.radius) + margin
        const dx = cx - p.cx
        const dy = cy - p.cy
        if (dx * dx + dy * dy < (r0 + r1) * (r0 + r1)) {
          ok = false
          break
        }
      }
    }
    if (!ok) break outer
    placed.push({ shapeName, radius, cx, cy })

    const angle = Math.random() * Math.PI * 2
    const vx = (Math.random() - 0.5) * startSpeed
    const vy = (Math.random() - 0.5) * startSpeed

    // Convert to Rapier coords (Y-up)
    const rx = cx
    const ry = toRapierY(cy)
    const rAngle = -angle
    const rvx = vx
    const rvy = -vy

    const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(rx, ry)
      .setRotation(rAngle)
      .setLinvel(rvx, rvy)

    const body = rapierWorld.createRigidBody(bodyDesc)

    let colliderDesc
    switch (shapeName) {
      case 'circle':
        colliderDesc = RAPIER.ColliderDesc.ball(radius)
        break
      case 'box': {
        const s = radius * 1.2
        colliderDesc = RAPIER.ColliderDesc.cuboid(s, s)
        break
      }
      case 'triangle': {
        const flatVerts = polygonFlatVerts(3, radius)
        colliderDesc = RAPIER.ColliderDesc.convexHull(new Float32Array(flatVerts))
        break
      }
      case 'pentagon': {
        const flatVerts = polygonFlatVerts(5, radius)
        colliderDesc = RAPIER.ColliderDesc.convexHull(new Float32Array(flatVerts))
        break
      }
      case 'hexagon': {
        const flatVerts = polygonFlatVerts(6, radius)
        colliderDesc = RAPIER.ColliderDesc.convexHull(new Float32Array(flatVerts))
        break
      }
      default:
        colliderDesc = RAPIER.ColliderDesc.ball(radius)
    }

    colliderDesc
      .setFriction(friction)
      .setRestitution(wallRestitution)

    rapierWorld.createCollider(colliderDesc, body)

    rigidBodies.push(body)
    bodyShapes.push({ shape: shapeName, radius })
  }
}

function getFriction() {
  return parseFloat(document.getElementById('friction').value)
}

function step(dt) {
  if (!rapierWorld) return
  rapierWorld.timestep = dt
  rapierWorld.step()

  const friction = getFriction()
  const damping = 1 - friction * 0.001

  for (let i = 0; i < rigidBodies.length; i++) {
    const body = rigidBodies[i]
    const vel = body.linvel()
    body.setLinvel({ x: vel.x * damping, y: vel.y * damping }, true)
  }
}

/** Rapier-local Y-up offsets (same as `regularPolygonVerts`) → canvas after `toCanvasY` on body center. */
function rapierLocalToCanvasPixel(cpx, cpy, rapierAngleRad, lx, ly) {
  const c = Math.cos(rapierAngleRad), s = Math.sin(rapierAngleRad)
  return {
    x: cpx + c * lx - s * ly,
    y: cpy - s * lx - c * ly,
  }
}

function drawShape(i) {
  const body = rigidBodies[i]
  const pos = body.translation()
  const angle = body.rotation()
  const b = bodyShapes[i]
  const colors = SHAPE_COLORS[b.shape] || SHAPE_COLORS.box

  const cpx = pos.x
  const cpy = toCanvasY(pos.y)

  ctx.fillStyle = colors.fill
  ctx.strokeStyle = colors.stroke
  ctx.lineWidth = 1.5

  if (b.shape === 'circle') {
    ctx.beginPath()
    ctx.arc(cpx, cpy, b.radius, 0, Math.PI * 2)
    ctx.fill()
    ctx.stroke()
  } else if (b.shape === 'box') {
    const s = b.radius * 1.2
    const lx = [-s, s, s, -s], ly = [-s, -s, s, s]
    ctx.beginPath()
    for (let v = 0; v < 4; v++) {
      const p = rapierLocalToCanvasPixel(cpx, cpy, angle, lx[v], ly[v])
      v === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  } else {
    const sides = { triangle: 3, pentagon: 5, hexagon: 6 }[b.shape] || 4
    const verts = regularPolygonVerts(sides, b.radius)
    ctx.beginPath()
    for (let v = 0; v < verts.length; v++) {
      const p = rapierLocalToCanvasPixel(cpx, cpy, angle, verts[v].x, verts[v].y)
      v === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)
    }
    ctx.closePath()
    ctx.fill()
    ctx.stroke()
  }
}

function render() {
  if (!rapierWorld || rigidBodies.length === 0) return

  ctx.clearRect(0, 0, W, H)

  for (let i = 0; i < rigidBodies.length; i++) {
    drawShape(i)
  }

  if (document.getElementById('showVertices').checked) {
    ctx.fillStyle = '#ff0'
    for (let i = 0; i < rigidBodies.length; i++) {
      const body = rigidBodies[i]
      const pos = body.translation()
      const angle = body.rotation()
      const b = bodyShapes[i]

      const cpx = pos.x
      const cpy = toCanvasY(pos.y)

      let verts
      if (b.shape === 'circle') {
        verts = []
        for (let a = 0; a < 8; a++) {
          const ang = (Math.PI * 2 * a) / 8
          verts.push({ x: Math.cos(ang) * b.radius, y: Math.sin(ang) * b.radius })
        }
      } else if (b.shape === 'box') {
        const s = b.radius * 1.2
        verts = [{ x: -s, y: -s }, { x: s, y: -s }, { x: s, y: s }, { x: -s, y: s }]
      } else {
        const sides = { triangle: 3, pentagon: 5, hexagon: 6 }[b.shape] || 4
        verts = regularPolygonVerts(sides, b.radius)
      }

      for (const v of verts) {
        const p = rapierLocalToCanvasPixel(cpx, cpy, angle, v.x, v.y)
        ctx.beginPath()
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2)
        ctx.fill()
      }
    }
  }
}

const WINDOW = 60
const frameDts = new Float64Array(WINDOW)
let ringIdx = 0, samplesFilled = 0

function avg(arr, filled) {
  let s = 0
  const n = Math.min(filled, WINDOW)
  for (let i = 0; i < n; i++) s += arr[i]
  return s / n
}

let last = null
function loop(ts) {
  const dt = last !== null ? ts - last : 0
  last = ts

  const t0 = performance.now()
  if (dt > 0 && document.getElementById('animate').checked && rapierWorld && rigidBodies.length > 0)
    step(Math.min(dt / 1000, 0.05))
  const elapsed = performance.now() - t0

  render()

  frameDts[ringIdx] = dt > 0 ? dt : 16.67
  ringIdx = (ringIdx + 1) % WINDOW
  samplesFilled++

  const avgDt = avg(frameDts, samplesFilled)
  const fps = avgDt > 0 ? 1000 / avgDt : 0

  document.getElementById('stats').textContent =
    `Rapier/Rust-WASM | ${rigidBodies.length} bodies | step: ${elapsed.toFixed(3)} ms | fps: ${fps.toFixed(1)}`

  requestAnimationFrame(loop)
}

async function resetAll() { ringIdx = 0; samplesFilled = 0; await init() }
document.getElementById('reset').addEventListener('click', resetAll)
document.getElementById('bodyCount').addEventListener('change', resetAll)
document.getElementById('shape').addEventListener('change', resetAll)

const frictionSlider = document.getElementById('friction')
const massSlider = document.getElementById('mass')
const startSpeedSlider = document.getElementById('startSpeed')
const frictionVal = document.getElementById('frictionVal')
const massVal = document.getElementById('massVal')
const startSpeedVal = document.getElementById('startSpeedVal')

frictionSlider.addEventListener('input', () => { frictionVal.textContent = parseFloat(frictionSlider.value).toFixed(2) })
massSlider.addEventListener('input', () => { massVal.textContent = parseFloat(massSlider.value).toFixed(1) })
startSpeedSlider.addEventListener('input', () => { startSpeedVal.textContent = parseInt(startSpeedSlider.value) })

;(async function main() {
  await init()
  requestAnimationFrame(loop)
})()
</script>
</body>
</html>
